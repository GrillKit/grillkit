category: "Control Flow"
track: "python"
level: "junior"

description: "Python control flow constructs: conditionals, loops, iterators, and context managers"

tasks:
  - id: "cf-001"
    difficulty: 1
    tags: ["break", "loops"]
    coding:
      language: python
      evaluation_mode: ai
      assignment:
        en: |
          Context:
          `find_first_even` scans the entire list even after the first even number is found.

          Your task:
          Stop the loop early with `break` once the first even number is found.
          Return `None` if no even number exists.
        ru: |
          Контекст:
          `find_first_even` проходит весь список, хотя первое чётное уже найдено.

          Задача:
          Остановите цикл через `break` после первого чётного. Если чётных нет — верните `None`.
      starter_code: |
        def find_first_even(numbers):
            for n in numbers:
                if n % 2 == 0:
                    return n
            return None


        print(find_first_even([1, 3, 4, 6, 8]))
        print(find_first_even([1, 3, 5]))
    expected_points:
      - "Uses break when even number found (or equivalent early exit)"
      - "Returns first even or None"

  - id: "cf-002"
    difficulty: 1
    tags: ["dict", "items", "iteration"]
    coding:
      language: python
      evaluation_mode: ai
      assignment:
        en: |
          Context:
          The loop prints scores by indexing into `scores` with each key from `scores.keys()`.
          That pattern is verbose and non-idiomatic.

          Your task:
          Refactor the loop to iterate with `.items()` while keeping the same output.
        ru: |
          Контекст:
          Баллы выводятся через индексацию по ключам из `scores.keys()`.

          Задача:
          Перепишите цикл на `.items()` с тем же выводом.
      starter_code: |
        scores = {"Alice": 85, "Bob": 92, "Charlie": 78}

        for name in scores.keys():
            print(name, scores[name])
    expected_points:
      - "Uses for name, score in scores.items()"
      - "Same print output as original"

  - id: "cf-003"
    difficulty: 2
    tags: ["range", "enumerate", "iteration"]
    coding:
      language: python
      evaluation_mode: ai
      assignment:
        en: |
          Context:
          The script prints index and value for each item using `range(len(...))`.
          That pattern is error-prone and unidiomatic in Python.

          Your task:
          Refactor the loop to use `enumerate()` while keeping the same printed output.
        ru: |
          Контекст:
          Индекс и значение выводятся через `range(len(...))`.

          Задача:
          Перепишите цикл на `enumerate()` с тем же выводом.
      starter_code: |
        items = ["a", "b", "c"]

        for i in range(len(items)):
            print(i, items[i])
    expected_points:
      - "Uses enumerate(items) instead of manual indexing"
      - "Same print output as original"

  - id: "cf-007"
    difficulty: 2
    tags: ["zip", "iteration"]
    coding:
      language: python
      evaluation_mode: ai
      assignment:
        en: |
          Context:
          Two parallel lists hold student names and scores. They must be printed in pairs.

          Your task:
          Complete the script so each line shows name and score using `zip()`.
          Example line format: `Alice 85`
        ru: |
          Контекст:
          Два списка — имена и баллы. Нужно вывести пары.

          Задача:
          Допишите код с `zip()`. Формат строки: `Alice 85`
      starter_code: |
        names = ["Alice", "Bob", "Charlie"]
        scores = [85, 92, 78]

        # print each name with its score
    expected_points:
      - "Iterates with zip(names, scores)"
      - "Prints all three pairs correctly"
