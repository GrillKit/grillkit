category: "Implement from scratch"
track: "python"
level: "middle"

description: "Design and implement small modules with clear contracts and tests"

tasks:
  - id: "im-flatten-001"
    difficulty: 3
    tags: ["recursion", "iterators", "lists", "algorithms"]
    coding:
      language: python
      evaluation_mode: ai
      assignment:
        en: |
          Context:
          Implement flatten(nested_list) that accepts a list of arbitrary nesting depth.
          Elements may be numbers, strings, or nested lists. Output must be a flat list
          preserving left-to-right order.

          Examples:
          flatten([1, [2, [3, 4], 5], 6]) -> [1, 2, 3, 4, 5, 6]
          flatten([[1], 2, [[3]]]) -> [1, 2, 3]
          flatten([1, "hello", [2, "world"]]) -> [1, "hello", 2, "world"]

          Your task:
          - implement flatten in the editor (iterative stack preferred over deep recursion)
          - add a small test_flatten() with the examples above plus at least one edge case
          - you may run the file locally; Submit sends your final code for review
        ru: |
          Контекст:
          Реализуйте flatten(nested_list) для списка произвольной вложенности.
          Числа, строки и вложенные списки сохраняют порядок обхода слева направо.

          Задача:
          - реализуйте flatten (лучше итеративно через стек)
          - добавьте test_flatten() с примерами и одним краевым случаем
      starter_code: |
        def flatten(nested_list):
            """Return a flat list preserving order."""
            raise NotImplementedError


        def test_flatten():
            assert flatten([1, [2, [3, 4], 5], 6]) == [1, 2, 3, 4, 5, 6]
            assert flatten([[1], 2, [[3]]]) == [1, 2, 3]
            assert flatten([1, "hello", [2, "world"]]) == [1, "hello", 2, "world"]
            assert flatten([]) == []
            assert flatten([[[[[42]]]]]) == [42]


        if __name__ == "__main__":
            test_flatten()
            print("All tests passed!")
    expected_points:
      - "Iterative stack-of-iterators or equivalent avoids recursion depth limits"
      - "Only lists are flattened; scalars appended in order"
      - "Handles empty input and deeply nested single value"
      - "Includes runnable tests covering examples and edge cases"

  - id: "im-config-002"
    difficulty: 2
    tags: ["dict", "validation", "types"]
    coding:
      language: python
      evaluation_mode: ai
      assignment:
        en: |
          Context:
          `parse_config` receives a plain dict from JSON. Required keys are `host` (str)
          and `port` (int). Optional `debug` defaults to `False`.

          Your task:
          Implement validation:
          - raise `ValueError` with a clear message if `host` or `port` is missing
          - raise `TypeError` if `port` is not an int
          - return a new dict with `host`, `port`, and `debug` (default False)
        ru: |
          Контекст:
          `parse_config` валидирует словарь конфигурации из JSON.

          Задача:
          - `ValueError`, если нет `host` или `port`
          - `TypeError`, если `port` не int
          - вернуть dict с `host`, `port`, `debug` (по умолчанию False)
      starter_code: |
        def parse_config(raw):
            """Validate and normalize application config from a JSON dict."""
            raise NotImplementedError


        cfg = parse_config({"host": "localhost", "port": 8080})
        print(cfg)

        cfg_debug = parse_config({"host": "api", "port": 443, "debug": True})
        print(cfg_debug)
    expected_points:
      - "Raises ValueError on missing host or port"
      - "Raises TypeError when port is not int"
      - "Returns dict with debug defaulting to False"
