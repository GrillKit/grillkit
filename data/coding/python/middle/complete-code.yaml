      assignment:
        en: |
          Context:
          You are given a Cache class that stores key-value pairs with a maximum size (maxsize).
          When a new item is added and the cache is full, the oldest item must be removed (FIFO policy).
          Methods __init__, get, and set are started but incomplete.

          Your task:
          Implement get and set so that:
          - get returns the value for an existing key, or None if the key is missing.
          - set inserts or updates a key; on update, move the key to the end of the eviction order.
          - when inserting a new key exceeds maxsize, remove the oldest key from both the queue and data.
