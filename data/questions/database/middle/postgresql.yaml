category: "PostgreSQL"
track: "database"
level: "middle"

description: "PostgreSQL-specific features: MVCC, advanced data types, extensions, configuration"

questions:
  - id: "pg-001"
    type: "knowledge"
    difficulty: 3
    tags: ["mvcc", "vacuum", "autovacuum"]
    question:
      text:
        en: "How does PostgreSQL implement MVCC (Multi-Version Concurrency Control)? What is VACUUM?"
        ru: "Как PostgreSQL реализует MVCC (многоверсионное управление параллелизмом)? Что такое VACUUM?"
      code: null
    follow_ups:
      en:
        - "How does MVCC avoid read locks?"
        - "What is transaction ID wraparound and how is it prevented?"
        - "How does autovacuum work and how do you tune it?"
      ru:
        - "Как MVCC избегает блокировок на чтение?"
        - "Что такое переполнение transaction ID и как его предотвращают?"
        - "Как работает autovacuum и как его настраивать?"
    expected_points:
      - "MVCC: each transaction sees a snapshot of data at commit"
      - "Old row versions remain until VACUUM removes them"
      - "Transaction ID wraparound: freezes old txids to prevent overflow"
      - "Autovacuum automates cleanup; tune with scale factor, cost delay"

  - id: "pg-002"
    type: "knowledge"
    difficulty: 3
    tags: ["advanced-types", "jsonb", "arrays", "hstore"]
    question:
      text:
        en: "What advanced data types does PostgreSQL support? How do you use JSONB for semi-structured data?"
        ru: "Какие продвинутые типы данных поддерживает PostgreSQL? Как использовать JSONB для полуструктурированных данных?"
      code: |
        CREATE TABLE events (
            id SERIAL PRIMARY KEY,
            payload JSONB
        );
        SELECT payload->>'user_id' as uid FROM events WHERE payload @> '{"type": "click"}';
    follow_ups:
      en:
        - "How do you index JSONB data (GIN indexes)?"
        - "What is the difference between JSON and JSONB?"
        - "How do array types and hstore compare to JSONB?"
      ru:
        - "Как индексировать JSONB (GIN-индексы)?"
        - "В чём разница между JSON и JSONB?"
        - "Чем массивы и hstore отличаются от JSONB?"
    expected_points:
      - "JSONB store as binary, supports indexing (GIN), no preserve key order"
      - "JSON stores text, slower for queries, preserves whitespace"
      - "Advanced types: arrays, range types, hstore (key-value), PostGIS"
      - "GIN indexes enable @>, ?, ?| operators on JSONB"

  - id: "pg-003"
    type: "knowledge"
    difficulty: 3
    tags: ["extensions", "postgis", "pgvector"]
    question:
      text:
        en: "What PostgreSQL extensions exist and how do they extend functionality?"
        ru: "Какие расширения PostgreSQL существуют и как они расширяют функциональность?"
      code: null
    follow_ups:
      en:
        - "How does PostGIS enable spatial queries?"
        - "What is pgvector and how is it used for AI applications?"
        - "What are extensions like pg_stat_statements used for?"
      ru:
        - "Как PostGIS обеспечивает пространственные запросы?"
        - "Что такое pgvector и как его используют в AI-приложениях?"
        - "Для чего нужны расширения вроде pg_stat_statements?"
    expected_points:
      - "PostGIS: geospatial queries (points, polygons, distance calculations)"
      - "pgvector: vector similarity search for LLM/ML applications"
      - "pg_stat_statements: tracks query performance statistics"
      - "uuid-ossp: UUID generation, pgcrypto: encryption functions"

  - id: "pg-004"
    type: "knowledge"
    difficulty: 3
    tags: ["postgres-config", "pg_hba", "postgresql.conf"]
    question:
      text:
        en: "How do you configure PostgreSQL for performance and security?"
        ru: "Как настроить PostgreSQL для производительности и безопасности?"
      code: null
    follow_ups:
      en:
        - "What parameters affect memory usage (shared_buffers, work_mem, maintenance_work_mem)?"
        - "How does pg_hba.conf control authentication?"
        - "What is effective_cache_size and how does it affect the query planner?"
      ru:
        - "Какие параметры влияют на использование памяти (shared_buffers, work_mem, maintenance_work_mem)?"
        - "Как pg_hba.conf управляет аутентификацией?"
        - "Что такое effective_cache_size и как это влияет на планировщик?"
    expected_points:
      - "shared_buffers: 25% of RAM for PostgreSQL buffer cache"
      - "work_mem: memory for sorts and hash tables (per operation)"
      - "effective_cache_size: estimate of OS-level cache size"
      - "pg_hba.conf: host-based authentication rules"

  - id: "pg-005"
    type: "knowledge"
    difficulty: 3
    tags: ["postgres-replication", "streaming"]
    question:
      text:
        en: "How does PostgreSQL replication work? Explain streaming replication and logical replication."
        ru: "Как работает репликация в PostgreSQL? Объясните потоковую и логическую репликацию."
      code: null
    follow_ups:
      en:
        - "What is synchronous vs asynchronous replication?"
        - "How does logical replication differ from physical?"
        - "How do you promote a standby server?"
      ru:
        - "В чём разница между синхронной и асинхронной репликацией?"
        - "Чем логическая репликация отличается от физической?"
        - "Как повысить standby до primary?"
    expected_points:
      - "Streaming replication: physical block-level copy of WAL"
      - "Logical replication: row-level changes via publication/subscription"
      - "Synchronous: write confirmed on primary and replica (slower)"
      - "pg_ctl promote or trigger file to activate standby"

  - id: "pg-006"
    type: "knowledge"
    difficulty: 3
    tags: ["VACUUM", "maintenance", "PostgreSQL"]
    question:
      text:
        en: "What does the `VACUUM` command do in PostgreSQL?"
        ru: "Что делает команда `VACUUM` в PostgreSQL?"
      code: null
    follow_ups:
      en:
        - "What is the difference between VACUUM and VACUUM FULL?"
        - "How does autovacuum work?"
        - "What is transaction ID wraparound and how does VACUUM help?"
      ru:
        - "В чём разница между VACUUM и VACUUM FULL?"
        - "Как работает autovacuum?"
        - "Что такое переполнение transaction ID и как VACUUM помогает?"
    expected_points:
      - "VACUUM: cleans up dead tuples (deleted/updated rows) marked by MVCC"
      - "Reclaims storage space for reuse but doesn't return it to OS"
      - "VACUUM FULL: rewrites table completely, returns space to OS (exclusive lock)"
      - "Prevents transaction ID wraparound by freezing old tuples"
      - "Autovacuum automatically runs VACUUM based on table activity"
