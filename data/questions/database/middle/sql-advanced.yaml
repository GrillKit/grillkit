    question:
      text:
        en: "What are indexes and how do they affect query performance? How do clustered and non-clustered indexes differ? What types of indexes exist and which index is used by default in PostgreSQL?"
        ru: "Что такое индексы и как они влияют на производительность запросов? Чем отличаются кластеризованные и некластеризованные индексы? Какие типы индексов бывают и какой индекс используется в PostgreSQL по умолчанию?"
      code: null
    follow_ups:
      en:
        - "What is the trade-off between read performance and write performance with indexes?"
        - "When should you not create an index?"
        - "What are composite indexes and how do they work?"
      ru:
        - "Какой компромисс между производительностью чтения и записи при использовании индексов?"
        - "Когда не стоит создавать индекс?"
        - "Что такое составные индексы и как они работают?"
    expected_points:
      - "Indexes speed up SELECT queries but slow down INSERT/UPDATE/DELETE"
      - "Clustered index determines physical order of data (1 per table)"
      - "Non-clustered index is separate structure with pointers to data"
      - "PostgreSQL default: B-tree index"
      - "Other index types: Hash, GiST, GIN, BRIN (for specific use cases)"

