    difficulty: 3
    tags: ["SQL-order", "aggregate-functions", "window-functions"]
    question:
      text:
        en: "In what order is an SQL query logically executed? What are aggregate functions and how do they differ from window functions?"
        ru: "В каком порядке логически выполняется SQL-запрос? Что такое агрегатные функции и чем они отличаются от оконных функций?"
      code: null
    follow_ups:
      en:
        - "What is the logical order of SQL clauses?"
        - "How do GROUP BY and HAVING affect query execution?"
        - "When would you use window functions instead of GROUP BY?"
      ru:
        - "Каков логический порядок предложений SQL?"
        - "Как GROUP BY и HAVING влияют на выполнение запроса?"
        - "Когда использовать оконные функции вместо GROUP BY?"
    expected_points:
      - "Logical order: FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT"
      - "Aggregate functions: operate on groups of rows, reduce multiple rows to single value (SUM, AVG, COUNT)"
      - "Window functions: operate on window of rows, preserve individual rows (ROW_NUMBER, RANK, SUM OVER)"
      - "Aggregate functions collapse rows, window functions keep rows"

