    question:
      text:
        en: "What is a transaction and a nested transaction? What does the acronym ACID stand for? What transaction isolation levels exist?"
        ru: "Что такое транзакция и вложенная транзакция? Что означает аббревиатура ACID? Какие уровни изоляции транзакций существуют?"
      code: null
