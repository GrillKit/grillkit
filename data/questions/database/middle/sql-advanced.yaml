        ru: "Что такое селективность колонки и как она влияет на планировщик запросов? Что такое `EXPLAIN` и `EXPLAIN ANALYZE`?"
      code: null
    follow_ups:
      en:
        - "How does the query planner use statistics to choose indexes?"
        - "What is cardinality estimation and why is it important?"
        - "How do you update statistics for the query planner?"
      ru:
