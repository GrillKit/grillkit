  - id: "sqla-006"
    type: "knowledge"
    difficulty: 3
    tags: ["views", "materialized-views"]
    question:
      text:
        en: "What are views and materialized views in SQL? When would you use each?"
        ru: "Что такое представления (views) и материализованные представления в SQL? Когда что использовать?"
      code: |
        CREATE VIEW active_users AS
        SELECT * FROM users WHERE status = 'active';

        CREATE MATERIALIZED VIEW monthly_sales AS
        SELECT date_trunc('month', order_date) as month,
               SUM(amount) as total
        FROM orders
        GROUP BY month;
    follow_ups:
      en:
        - "Can you INSERT/UPDATE through a view?"
        - "How do you refresh a materialized view?"
        - "What are the performance characteristics of each?"
      ru:
        - "Можно ли выполнять INSERT/UPDATE через представление?"
        - "Как обновить материализованное представление?"
        - "Какие у них характеристики производительности?"
    expected_points:
      - "View: virtual table based on a query (saved query definition)"
      - "Materialized view: cached result set stored on disk"
      - "Views always return current data; materialized need refresh"
      - "Use materialized views for expensive aggregations that rarely change"

  - id: "sqla-007"
