category: "Distributed Databases"
track: "database"
level: "senior"

description: "Distributed database systems: sharding, replication, leader election, and distributed SQL"

questions:
  - id: "dbd-001"
    type: "knowledge"
    difficulty: 5
    tags: ["sharding", "consistent-hashing"]
    question:
      text:
        en: "How does database sharding work? How does consistent hashing distribute data?"
        ru: "Как работает шардирование базы данных? Как consistent hashing распределяет данные?"
      code: null
    follow_ups:
      en:
        - "What hash ring and virtual nodes mean in consistent hashing?"
        - "How do you reshard data when adding new shards?"
        - "What is the difference between application-level and database-level sharding?"
      ru:
        - "Что такое hash ring и virtual nodes в consistent hashing?"
        - "Как перешардировать данные при добавлении новых шардов?"
        - "В чём разница между шардированием на уровне приложения и СУБД?"
    expected_points:
      - "Sharding splits data across multiple database instances"
      - "Consistent hashing minimizes rehashing when nodes change"
      - "Virtual nodes improve load distribution across physical nodes"
      - "Resharding is complex — plan for overprovisioning"

  - id: "dbd-002"
    type: "knowledge"
    difficulty: 5
    tags: ["distributed-sql", "cockroachdb", "spanner"]
    question:
      text:
        en: "How do distributed SQL databases (CockroachDB, Google Spanner, YugabyteDB) work?"
        ru: "Как работают распределённые SQL-базы (CockroachDB, Google Spanner, YugabyteDB)?"
      code: null
    follow_ups:
      en:
        - "How does CockroachDB achieve serializable isolation across nodes?"
        - "What is TrueTime (Spanner) vs hybrid logical clocks (CockroachDB)?"
        - "How do distributed SQL databases handle transactions across regions?"
      ru:
        - "Как CockroachDB обеспечивает serializable изоляцию между узлами?"
        - "Что такое TrueTime (Spanner) и hybrid logical clocks (CockroachDB)?"
        - "Как распределённые SQL-БД обрабатывают транзакции между регионами?"
    expected_points:
      - "Distributed SQL: full SQL support with horizontal scaling"
      - "CockroachDB: uses Raft for consensus, HLC for ordering"
      - "Spanner: TrueTime API (GPS + atomic clocks) for external consistency"
      - "Cross-region transactions have latency proportional to distance"

  - id: "dbd-003"
    type: "knowledge"
    difficulty: 5
    tags: ["leader-election", "failover"]
    question:
      text:
        en: "How does leader election and automatic failover work in distributed databases?"
        ru: "Как работают выбор лидера и автоматический failover в распределённых базах?"
      code: null
    follow_ups:
      en:
        - "How does Raft-based leader election compare to Paxos?"
        - "What is split-brain and how is it prevented?"
        - "How does Patroni manage PostgreSQL automatic failover?"
      ru:
        - "Чем выбор лидера на Raft отличается от Paxos?"
        - "Что такое split-brain и как его предотвращают?"
        - "Как Patroni управляет автоматическим failover PostgreSQL?"
    expected_points:
      - "Leader election: nodes vote for a leader, majority required"
      - "Raft: simpler than Paxos, uses term numbers and log replication"
      - "Split-brain: two nodes think they are primary — use fencing/quorum"
      - "Patroni: Raft/etcd-based high availability for PostgreSQL"

  - id: "dbd-004"
    type: "knowledge"
    difficulty: 5
    tags: ["multi-region", "geo-distribution"]
    question:
      text:
        en: "How do you design a multi-region database topology? What are the trade-offs?"
        ru: "Как спроектировать мультирегиональную топологию базы данных? Какие компромиссы?"
      code: null
    follow_ups:
      en:
        - "What is active-passive vs active-active multi-region setup?"
        - "How do bidirectionally replication and conflict resolution work?"
        - "What GDPR considerations affect multi-region database design?"
      ru:
        - "В чём разница active-passive и active-active между регионами?"
        - "Как работают двунаправленная репликация и разрешение конфликтов?"
        - "Как GDPR влияет на мультирегиональный дизайн БД?"
    expected_points:
      - "Active-passive: one primary region, others read replicas"
      - "Active-active: all regions accept writes — needs conflict resolution"
      - "Conflict resolution: last-writer-wins (LWW), CRDT, custom merge"
      - "GDPR: data residency requirements may restrict database placement"

  - id: "dbd-005"
    type: "knowledge"
    difficulty: 5
    tags: ["backup", "PITR", "disaster-recovery"]
    question:
      text:
        en: "How do you design backup and disaster recovery strategies for databases?"
        ru: "Как спроектировать стратегии резервного копирования и аварийного восстановления для БД?"
      code: null
    follow_ups:
      en:
        - "What is the difference between full, incremental, and differential backups?"
        - "What is Point-In-Time Recovery (PITR) and how does WAL archiving work?"
        - "How do you test backup recovery and what is RPO/RTO?"
      ru:
        - "В чём разница полного, инкрементального и дифференциального бэкапа?"
        - "Что такое Point-In-Time Recovery (PITR) и как работает архивирование WAL?"
        - "Как тестировать восстановление из бэкапа и что такое RPO/RTO?"
    expected_points:
      - "RPO (Recovery Point Objective): max acceptable data loss"
      - "RTO (Recovery Time Objective): max acceptable downtime"
      - "PITR: restore database to any point in time using WAL archives"
      - "Test recovery regularly — untested backups are as good as no backups"
