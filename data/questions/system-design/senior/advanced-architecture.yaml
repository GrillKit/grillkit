category: "Advanced Architecture"
track: "system-design"
level: "senior"

description: "Deep architecture: event-driven systems, event sourcing, stream processing, and migration patterns"

questions:
  - id: "aad-001"
    type: "knowledge"
    difficulty: 5
    tags: ["event-driven", "event-bus"]
    question:
      text:
        en: "How do you design an event-driven architecture? What patterns and technologies are involved?"
        ru: "Как спроектировать событийно-ориентированную архитектуру? Какие паттерны и технологии используются?"
      code: null
    follow_ups:
      en:
        - "What is the difference between event-driven and message-driven architecture?"
        - "How do you guarantee event ordering and exactly-once processing?"
        - "How do you handle schema evolution in event-driven systems (Schema Registry)?"
      ru:
        - "В чём разница между событийно-ориентированной и сообщением-ориентированной архитектурой?"
        - "Как гарантировать порядок событий и обработку ровно один раз (exactly-once)?"
        - "Как обрабатывать эволюцию схем в событийных системах (Schema Registry)?"
    expected_points:
      - "Event-driven: services communicate via events, not direct calls"
      - "Events are immutable facts stored in an event log"
      - "Schema Registry (Avro/Protobuf) manages event schema evolution"
      - "Event sourcing stores state as a sequence of events"

  - id: "aad-002"
    type: "knowledge"
    difficulty: 5
    tags: ["event-sourcing", "projections", "rebuilding"]
    question:
      text:
        en: "What is event sourcing? How do you rebuild read models (projections) and handle versioning?"
        ru: "Что такое event sourcing? Как перестраивать модели чтения (projections) и работать с версионированием?"
      code: null
    follow_ups:
      en:
        - "How do you handle event schema changes (upcasting, versioning)?"
        - "What is CQRS with event sourcing and how do they complement each other?"
        - "How do you snapshot event streams for performance?"
      ru:
        - "Как обрабатывать изменения схем событий (upcasting, versioning)?"
        - "Что такое CQRS с event sourcing и как они дополняют друг друга?"
        - "Как создавать снимки (snapshots) потоков событий для производительности?"
    expected_points:
      - "Event sourcing stores state changes as immutable events"
      - "Projections: read models built from event streams"
      - "Rebuilding: replay all events to reconstruct projection"
      - "Snapshots store aggregate state periodically to limit replay"

  - id: "aad-003"
    type: "knowledge"
    difficulty: 5
    tags: ["stream-processing", "flink", "ksqldb"]
    question:
      text:
        en: "How do you approach real-time stream processing? Compare Apache Kafka Streams, Flink, and ksqlDB."
        ru: "Как подходить к потоковой обработке в реальном времени? Сравните Apache Kafka Streams, Flink и ksqlDB."
      code: null
    follow_ups:
      en:
        - "What is the difference between stream processing and batch processing?"
        - "How do you handle late-arriving data and watermarks?"
        - "When would you embed stream processing in the app vs use a dedicated cluster?"
      ru:
        - "В чём разница между потоковой и пакетной обработкой?"
        - "Как обрабатывать данные, поступающие с опозданием, и водяные знаки (watermarks)?"
        - "Когда встраивать потоковую обработку в приложение, а когда использовать отдельный кластер?"
    expected_points:
      - "Kafka Streams: lightweight, embeddable, exactly-once semantics"
      - "Flink: full-featured, exactly-once, event time processing"
      - "ksqlDB: SQL-based stream processing on Kafka topics"
      - "Choose based on throughput, state size, and operational complexity"

  - id: "aad-004"
    type: "knowledge"
    difficulty: 5
    tags: ["migration-strategies", "strangler-fig"]
    question:
      text:
        en: "How do you migrate from a monolith to microservices? Explain the strangler fig pattern and incremental migration."
        ru: "Как мигрировать с монолита на микросервисы? Объясните паттерн strangler fig и инкрементальную миграцию."
      code: null
    follow_ups:
      en:
        - "How do you handle shared database during migration?"
        - "What is the dark launch/canary release pattern?"
        - "How do you manage API versioning during migration (parallel run)?"
      ru:
        - "Как работать с общей базой данных во время миграции?"
        - "Что такое паттерн dark launch/canary release?"
        - "Как управлять версионированием API во время миграции (parallel run)?"
    expected_points:
      - "Strangler fig: gradually replace monolith components with services"
      - "Route traffic to new service incrementally (feature flags, proxies)"
      - "Shared DB — isolate data access per bounded context"
      - "Parallel run: run old and new systems, compare results"
