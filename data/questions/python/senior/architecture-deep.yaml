category: "Advanced Architecture"
language: "python"
level: "senior"

description: "Deep architecture: event-driven, real-time systems, data pipelines, architectural decision records"

questions:
  - id: "aad-001"
    type: "knowledge"
    difficulty: 5
    tags: ["event-driven", "event-bus"]
    question:
      text: "How do you design an event-driven architecture? What patterns and technologies are involved?"
      code: null
    follow_ups:
      - "What is the difference between event-driven and message-driven architecture?"
      - "How do you guarantee event ordering and exactly-once processing?"
      - "How do you handle schema evolution in event-driven systems (Schema Registry)?"
    expected_points:
      - "Event-driven: services communicate via events, not direct calls"
      - "Events are immutable facts stored in an event log"
      - "Schema Registry (Avro/Protobuf) manages event schema evolution"
      - "Event sourcing stores state as a sequence of events"

  - id: "aad-002"
    type: "knowledge"
    difficulty: 5
    tags: ["event-sourcing", "projections", "rebuilding"]
    question:
      text: "What is event sourcing? How do you rebuild read models (projections) and handle versioning?"
      code: null
    follow_ups:
      - "How do you handle event schema changes (upcasting, versioning)?"
      - "What is CQRS with event sourcing and how do they complement each other?"
      - "How do you snapshot event streams for performance?"
    expected_points:
      - "Event sourcing stores state changes as immutable events"
      - "Projections: read models built from event streams"
      - "Rebuilding: replay all events to reconstruct projection"
      - "Snapshots store aggregate state periodically to limit replay"

  - id: "aad-003"
    type: "knowledge"
    difficulty: 5
    tags: ["stream-processing", "flink", "ksqldb"]
    question:
      text: "How do you approach real-time stream processing? Compare Apache Kafka Streams, Flink, and ksqlDB."
      code: null
    follow_ups:
      - "What is the difference between stream processing and batch processing?"
      - "How do you handle late-arriving data and watermarks?"
      - "What Python libraries exist for stream processing (faust, quix, bytewax)?"
    expected_points:
      - "Kafka Streams: lightweight, embeddable, exactly-once semantics"
      - "Flink: full-featured, exactly-once, event time processing"
      - "ksqlDB: SQL-based stream processing on Kafka topics"
      - "Python: Bytewax, Quix — native stream processing for Python"

  - id: "aad-004"
    type: "knowledge"
    difficulty: 5
    tags: ["data-pipelines", "etl", "data-warehouse"]
    question:
      text: "How do you design and orchestrate data pipelines in a Python ecosystem?"
      code: null
    follow_ups:
      - "How does Airflow compare to Prefect and Dagster?"
      - "What is the difference between ETL and ELT?"
      - "How do you handle data quality checks and lineage tracking?"
    expected_points:
      - "Airflow: DAG-based scheduler with operators and sensors"
      - "Prefect: modern workflow engine with retries, caching, notifications"
      - "Dagster: asset-based orchestration with lineage and type system"
      - "dbt: SQL-first transformation tool for analytics engineering"

  - id: "aad-005"
    type: "knowledge"
    difficulty: 5
    tags: ["architectural-decisions", "ADR"]
    question:
      text: "What is an Architectural Decision Record (ADR)? How do you use them in a Python project?"
      code: null
    follow_ups:
      - "What is the structure of an ADR (Title, Context, Decision, Consequences)?"
      - "When should you write an ADR vs just documenting in code?"
      - "How do you keep ADRs discoverable and up to date?"
    expected_points:
      - "ADR captures significant architectural decisions with rationale"
      - "Context: problem, constraints, options considered"
      - "Decision: what was chosen and why"
      - "Consequences: trade-offs, impacts, and future considerations"

  - id: "aad-006"
    type: "knowledge"
    difficulty: 5
    tags: ["chaos-engineering", "resilience-testing"]
    question:
      text: "What is chaos engineering? How do you apply it to Python microservices?"
      code: null
    follow_ups:
      - "What tools exist for chaos engineering in Python (chaostoolkit, Gremlin)?"
      - "What experiments would you run first (network latency, pod failure, resource exhaustion)?"
      - "How do you measure resilience and set steady-state hypotheses?"
    expected_points:
      - "Chaos engineering: proactively inject failures to test system resilience"
      - "Start with blast-radius-controlled experiments in staging"
      - "Chaostoolkit: Python-based chaos engineering framework"
