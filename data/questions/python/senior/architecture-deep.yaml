  - id: "aad-007"
    type: "knowledge"
    difficulty: 5
    tags: ["migration-strategies", "strangler-fig"]
    question:
      text: "How do you migrate from a monolith to microservices? Explain the strangler fig pattern and incremental migration."
      code: null
    follow_ups:
      - "How do you handle shared database during migration?"
      - "What is the dark launch/canary release pattern?"
      - "How do you manage API versioning during migration (parallel run)?"
    expected_points:
      - "Strangler fig: gradually replace monolith components with services"
      - "Route traffic to new service incrementally (feature flags, proxies)"
      - "Shared DB — isolate data access per bounded context"
      - "Parallel run: run old and new systems, compare results"
