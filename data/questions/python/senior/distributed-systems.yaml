category: "Distributed Systems"
language: "python"
level: "senior"

description: "Distributed systems: consensus, transactions, observability, service mesh, and resilience patterns"

questions:
  - id: "dsys-001"
    type: "knowledge"
    difficulty: 5
    tags: ["consensus", "raft", "paxos"]
    question:
      text: "How do consensus algorithms like Raft and Paxos work? When would you need them in a Python system?"
      code: null
    follow_ups:
      - "What problem does consensus solve (leader election, log replication)?"
      - "How does Raft simplify Paxos (terms, leader, log matching)?"
      - "What Python libraries implement Raft (e.g., pysyncobj)?"
    expected_points:
      - "Consensus ensures multiple nodes agree on a value despite failures"
      - "Raft: leader election, log replication, safety via committed entries"
      - "Paxos: more complex, multiple phases (prepare/promise/accept)"
      - "Needed for: distributed locks, configuration stores, replicated state machines"

  - id: "dsys-002"
    type: "knowledge"
    difficulty: 5
    tags: ["distributed-transactions", "saga"]
    question:
      text: "How do you manage distributed transactions in a microservices architecture? Compare 2PC and Saga."
      code: null
    follow_ups:
      - "What are the failure modes of two-phase commit (2PC)?"
      - "How does choreography-based saga differ from orchestration-based?"
      - "How do you handle compensating transactions (rollback) in a saga?"
    expected_points:
      - "2PC: coordinator votes on prepare, then commit — blocking, not resilient"
      - "Saga: sequence of local transactions with compensating actions"
      - "Choreography: each service publishes events triggering next step"
      - "Orchestration: central coordinator manages the saga flow"

  - id: "dsys-003"
    type: "knowledge"
    difficulty: 5
    tags: ["observability", "tracing", "monitoring"]
    question:
      text: "What is observability in distributed systems? Explain the three pillars (logs, metrics, traces)."
      code: null
    follow_ups:
      - "How does distributed tracing work (OpenTelemetry, Jaeger)?"
      - "What is the difference between RED and USE metrics?"
      - "How do you correlate logs, metrics, and traces in practice?"
    expected_points:
      - "Logs: unstructured or structured event records"
      - "Metrics: time-series data (counters, gauges, histograms)"
      - "Traces: end-to-end request flow across services (spans, trace IDs)"
      - "OpenTelemetry is the standard for instrumentation in Python"

  - id: "dsys-004"
    type: "knowledge"
    difficulty: 5
    tags: ["circuit-breaker", "resilience"]
    question:
      text: "What resilience patterns are used in distributed systems? Explain circuit breaker, bulkhead, and retry with backoff."
      code: null
    follow_ups:
      - "How does the circuit breaker pattern work (closed/open/half-open)?"
      - "What is exponential backoff with jitter and why is it important?"
      - "How do you implement bulkhead isolation in Python (thread pools, semaphores)?"
    expected_points:
      - "Circuit breaker: prevent cascading failures by failing fast"
      - "Bulkhead: isolate resources to limit blast radius"
      - "Retry with backoff: retry with increasing delays + jitter"
      - "Python libraries: pybreaker, tenacity, aioretry"

  - id: "dsys-005"
    type: "knowledge"
    difficulty: 5
    tags: ["service-mesh", "envoy", "istio"]
    question:
      text: "What is a service mesh? How does it work (sidecar proxy, control plane)?"
      code: null
    follow_ups:
      - "What problems does a service mesh solve (mTLS, traffic management, observability)?"
      - "How does Envoy proxy work as a sidecar in Istio?"
      - "When is a service mesh overkill for a Python application?"
    expected_points:
      - "Service mesh: dedicated infrastructure layer for service-to-service communication"
      - "Sidecar proxy (Envoy) intercepts all network traffic"
      - "Control plane (Istio) manages configuration, certificates, routing"
      - "Provides mTLS, traffic splitting, circuit breaking, telemetry"

  - id: "dsys-006"
    type: "knowledge"
    difficulty: 5
    tags: ["idempotency", "deduplication"]
    question:
      text: "How do you handle idempotency and deduplication in distributed systems?"
      code: null
    follow_ups:
      - "What is an idempotency key and how do you enforce it?"
      - "How does at-least-once vs exactly-once delivery affect idempotency?"
      - "How do you deduplicate messages in a Kafka consumer?"
    expected_points:
      - "Idempotency: same request multiple times produces same result"
      - "Use idempotency keys (headers) — store processed keys in DB"
      - "At-least-once delivery requires idempotent consumers"
      - "Deduplication: maintain a dedup window (cache) for message IDs"

  - id: "dsys-007"
    type: "knowledge"
    difficulty: 5
    tags: ["eventual-consistency", "conflict-resolution"]
    question:
      text: "What is eventual consistency? How do you handle conflict resolution in distributed databases?"
      code: null
    follow_ups:
      - "What is the difference between strong, eventual, and causal consistency?"
      - "How does CRDT (Conflict-Free Replicated Data Type) work?"
      - "What conflict resolution strategies exist (LWW, merge, custom)?"
    expected_points:
      - "Eventual consistency: all replicas converge given enough time"
      - "Strong consistency: all reads reflect latest write (slower)"
      - "CRDTs: data structures that automatically resolve conflicts"
      - "Conflict strategies: last-writer-wins (LWW), application-level merge"
