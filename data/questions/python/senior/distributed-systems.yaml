category: "Distributed Systems"
language: "python"
level: "senior"

description: "Distributed systems: consensus, transactions, observability, service mesh, and resilience patterns"

questions:
  - id: "dsys-001"
    type: "knowledge"
    difficulty: 5
    tags: ["consensus", "raft", "paxos"]
    question:
      text:
        en: "How do consensus algorithms like Raft and Paxos work? When would you need them in a Python system?"
        ru: "Как работают алгоритмы консенсуса, такие как Raft и Paxos? Когда они могут понадобиться в Python-системе?"
      code: null
    follow_ups:
      en:
        - "What problem does consensus solve (leader election, log replication)?"
        - "How does Raft simplify Paxos (terms, leader, log matching)?"
        - "What Python libraries implement Raft (e.g., pysyncobj)?"
      ru:
        - "Какую проблему решает консенсус (выбор лидера, репликация лога)?"
        - "Как Raft упрощает Paxos (термы, лидер, соответствие логов)?"
        - "Какие Python-библиотеки реализуют Raft (например, pysyncobj)?"
    expected_points:
      - "Consensus ensures multiple nodes agree on a value despite failures"
      - "Raft: leader election, log replication, safety via committed entries"
      - "Paxos: more complex, multiple phases (prepare/promise/accept)"
      - "Needed for: distributed locks, configuration stores, replicated state machines"

  - id: "dsys-002"
    type: "knowledge"
    difficulty: 5
    tags: ["distributed-transactions", "saga"]
    question:
      text:
        en: "How do you manage distributed transactions in a microservices architecture? Compare 2PC and Saga."
        ru: "Как управлять распределёнными транзакциями в микросервисной архитектуре? Сравните 2PC и Saga."
      code: null
    follow_ups:
      en:
        - "What are the failure modes of two-phase commit (2PC)?"
        - "How does choreography-based saga differ from orchestration-based?"
        - "How do you handle compensating transactions (rollback) in a saga?"
      ru:
        - "Каковы режимы отказа двухфазного коммита (2PC)?"
        - "Чем хореографическая saga отличается от оркестрационной?"
        - "Как обрабатывать компенсирующие транзакции (откат) в saga?"
    expected_points:
      - "2PC: coordinator votes on prepare, then commit — blocking, not resilient"
      - "Saga: sequence of local transactions with compensating actions"
      - "Choreography: each service publishes events triggering next step"
      - "Orchestration: central coordinator manages the saga flow"

  - id: "dsys-003"
    type: "knowledge"
    difficulty: 5
    tags: ["observability", "tracing", "monitoring"]
    question:
      text:
        en: "What is observability in distributed systems? Explain the three pillars (logs, metrics, traces)."
        ru: "Что такое наблюдаемость (observability) в распределённых системах? Объясните три столпа (логи, метрики, трейсы)."
      code: null
    follow_ups:
      en:
        - "How does distributed tracing work (OpenTelemetry, Jaeger)?"
        - "What is the difference between RED and USE metrics?"
        - "How do you correlate logs, metrics, and traces in practice?"
      ru:
        - "Как работает распределённая трассировка (OpenTelemetry, Jaeger)?"
        - "В чём разница между RED и USE метриками?"
        - "Как соотносить логи, метрики и трейсы на практике?"
    expected_points:
      - "Logs: unstructured or structured event records"
      - "Metrics: time-series data (counters, gauges, histograms)"
      - "Traces: end-to-end request flow across services (spans, trace IDs)"
      - "OpenTelemetry is the standard for instrumentation in Python"

  - id: "dsys-004"
    type: "knowledge"
    difficulty: 5
    tags: ["circuit-breaker", "resilience"]
    question:
      text:
        en: "What resilience patterns are used in distributed systems? Explain circuit breaker, bulkhead, and retry with backoff."
        ru: "Какие паттерны отказоустойчивости используются в распределённых системах? Объясните circuit breaker, bulkhead и retry with backoff."
      code: null
    follow_ups:
      en:
        - "How does the circuit breaker pattern work (closed/open/half-open)?"
        - "What is exponential backoff with jitter and why is it important?"
        - "How do you implement bulkhead isolation in Python (thread pools, semaphores)?"
      ru:
        - "Как работает паттерн circuit breaker (closed/open/half-open)?"
        - "Что такое экспоненциальная задержка с джиттером и почему это важно?"
        - "Как реализовать изоляцию bulkhead в Python (пулы потоков, семафоры)?"
    expected_points:
      - "Circuit breaker: prevent cascading failures by failing fast"
      - "Bulkhead: isolate resources to limit blast radius"
      - "Retry with backoff: retry with increasing delays + jitter"
      - "Python libraries: pybreaker, tenacity, aioretry"

  - id: "dsys-005"
    type: "knowledge"
    difficulty: 5
    tags: ["service-mesh", "envoy", "istio"]
    question:
      text:
        en: "What is a service mesh? How does it work (sidecar proxy, control plane)?"
        ru: "Что такое service mesh? Как он работает (sidecar proxy, control plane)?"
      code: null
    follow_ups:
      en:
        - "What problems does a service mesh solve (mTLS, traffic management, observability)?"
        - "How does Envoy proxy work as a sidecar in Istio?"
        - "When is a service mesh overkill for a Python application?"
      ru:
        - "Какие проблемы решает service mesh (mTLS, управление трафиком, наблюдаемость)?"
        - "Как Envoy proxy работает как sidecar в Istio?"
        - "Когда service mesh избыточен для Python-приложения?"
    expected_points:
      - "Service mesh: dedicated infrastructure layer for service-to-service communication"
      - "Sidecar proxy (Envoy) intercepts all network traffic"
