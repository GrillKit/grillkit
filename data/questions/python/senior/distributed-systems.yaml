  - id: "dsys-006"
    type: "knowledge"
    difficulty: 5
    tags: ["idempotency", "deduplication"]
    question:
      text:
        en: "How do you handle idempotency and deduplication in distributed systems?"
        ru: "Как работать с идемпотентностью и дедупликацией в распределённых системах?"
      code: null
    follow_ups:
      en:
        - "What is an idempotency key and how do you enforce it?"
        - "How does at-least-once vs exactly-once delivery affect idempotency?"
        - "How do you deduplicate messages in a Kafka consumer?"
      ru:
        - "Что такое ключ идемпотентности и как его применять?"
        - "Как доставка at-least-once vs exactly-once влияет на идемпотентность?"
        - "Как дедуплицировать сообщения в Kafka-потребителе?"
    expected_points:
      - "Idempotency: same request multiple times produces same result"
      - "Use idempotency keys (headers) — store processed keys in DB"
      - "At-least-once delivery requires idempotent consumers"
      - "Deduplication: maintain a dedup window (cache) for message IDs"

  - id: "dsys-007"
    type: "knowledge"
    difficulty: 5
    tags: ["eventual-consistency", "conflict-resolution"]
    question:
      text:
        en: "What is eventual consistency? How do you handle conflict resolution in distributed databases?"
        ru: "Что такое согласованность в конечном счёте (eventual consistency)? Как разрешать конфликты в распределённых базах данных?"
      code: null
    follow_ups:
      en:
        - "What is the difference between strong, eventual, and causal consistency?"
        - "How does CRDT (Conflict-Free Replicated Data Type) work?"
        - "What conflict resolution strategies exist (LWW, merge, custom)?"
      ru:
        - "В чём разница между строгой, согласованностью в конечном счёте и каузальной?"
        - "Как работают CRDT (Conflict-Free Replicated Data Type)?"
        - "Какие стратегии разрешения конфликтов существуют (LWW, merge, custom)?"
    expected_points:
      - "Eventual consistency: all replicas converge given enough time"
      - "Strong consistency: all reads reflect latest write (slower)"
      - "CRDTs: data structures that automatically resolve conflicts"
      - "Conflict strategies: last-writer-wins (LWW), application-level merge"
