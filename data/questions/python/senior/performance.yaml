  - id: "perf-005"
    type: "knowledge"
    difficulty: 4
    tags: ["async-perf", "connection-pools", "batch-processing"]
    question:
      text:
        en: "How do you optimize async I/O performance in Python? What patterns improve throughput?"
        ru: "Как оптимизировать производительность асинхронного ввода-вывода в Python? Какие паттерны улучшают пропускную способность?"
      code: null
    follow_ups:
      en:
        - "Why is connection pooling critical for async database/web clients?"
        - "How do semaphores help with rate limiting in async code?"
        - "What is the difference between asyncio.gather and asyncio.wait?"
      ru:
        - "Почему пул соединений критичен для асинхронных БД/веб-клиентов?"
        - "Как семафоры помогают с ограничением скорости в асинхронном коде?"
        - "В чём разница между asyncio.gather и asyncio.wait?"
    expected_points:
      - "Use connection pools (aiohttp.TCPConnector, asyncpg.create_pool)"
      - "Limit concurrency with asyncio.Semaphore to avoid resource exhaustion"
      - "Batch database operations (bulk inserts) for throughput"
      - "Use asyncio.gather for parallel I/O, not for CPU-bound work"

  - id: "perf-006"
    type: "knowledge"
    difficulty: 4
    tags: ["caching", "lru-cache", "memoization"]
    question:
      text:
        en: "How does functools.lru_cache and functools.cache work? When should you use caching to optimize Python code?"
        ru: "Как работают functools.lru_cache и functools.cache? Когда использовать кеширование для оптимизации Python-кода?"
      code: |
        from functools import lru_cache

        @lru_cache(maxsize=128)
        def expensive_computation(n: int) -> int:
            return n ** n
    follow_ups:
      en:
        - "What are the memory implications of unbounded caching?"
        - "How does lru_cache handle unhashable arguments?"
        - "What caching strategies exist (TTL, LRU, LFU)?"
      ru:
        - "Каковы последствия для памяти при неограниченном кешировании?"
        - "Как lru_cache обрабатывает нехешируемые аргументы?"
        - "Какие стратегии кеширования существуют (TTL, LRU, LFU)?"
    expected_points:
      - "lru_cache caches return values based on arguments (LRU eviction)"
      - "cache is unbounded — use it carefully with finite inputs"
      - "Redis or memcached for distributed caching across processes"
      - "TTL caches prevent stale data while limiting memory"

