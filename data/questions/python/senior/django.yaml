  - id: "django-s-008"
    type: "knowledge"
    difficulty: 4
    tags: ["django", "custom-user"]
    question:
      text:
        en: "Why define a custom User model at project start? What are the migration implications?"
        ru: "Зачем определять кастомную User model в начале проекта? Какие последствия для миграций?"
      code: |
        AUTH_USER_MODEL = "accounts.User"
    follow_ups:
      en:
        - "What happens if you switch User model late?"
        - "How do foreign keys reference the user model?"
      ru:
        - "Что будет, если сменить User model поздно?"
        - "Как ForeignKey ссылается на user model?"
    expected_points:
      - "Hard to change AUTH_USER_MODEL after first migration"
      - "Use settings.AUTH_USER_MODEL or get_user_model()"
      - "Subclass AbstractUser or AbstractBaseUser for email login etc."
