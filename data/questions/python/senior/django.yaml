category: "Django Production"
track: "python"
level: "senior"

description: "Senior Django: performance at scale, Celery, multi-database, and production hardening"

questions:
  - id: "django-s-001"
    type: "knowledge"
    difficulty: 4
    tags: ["django", "performance", "orm"]
    question:
      text:
        en: "How do you optimize Django ORM queries under high load?"
        ru: "Как оптимизировать запросы Django ORM под высокой нагрузкой?"
      code: null
    follow_ups:
      en:
        - "What tools profile Django queries (django-debug-toolbar, silk)?"
        - "When denormalize vs optimize queries?"
      ru:
        - "Какие инструменты профилируют запросы Django?"
        - "Когда денормализовать, а когда оптимизировать запросы?"
    expected_points:
      - "select_related, prefetch_related, only/defer"
      - "Database indexes aligned with filter/sort columns"
      - "Query count budgets per request; cache expensive aggregates"

  - id: "django-s-002"
    type: "knowledge"
    difficulty: 4
    tags: ["django", "connection-pooling"]
    question:
      text:
        en: "How does connection pooling work with Django and PostgreSQL?"
        ru: "Как работает connection pooling с Django и PostgreSQL?"
      code: null
    follow_ups:
      en:
        - "What is PgBouncer transaction vs session pooling?"
        - "How does CONN_MAX_AGE affect connections?"
      ru:
        - "Чем transaction pooling отличается от session pooling в PgBouncer?"
        - "Как CONN_MAX_AGE влияет на соединения?"
    expected_points:
      - "Django opens connections per request by default"
      - "CONN_MAX_AGE reuses connections across requests"
      - "PgBouncer pools at infrastructure layer for many workers"

  - id: "django-s-003"
