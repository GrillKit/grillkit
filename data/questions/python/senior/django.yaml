    difficulty: 4
    tags: ["django", "read-replicas"]
    question:
      text:
        en: "How do you route reads to replicas in a Django application?"
        ru: "Как направлять чтение на реплики в Django-приложении?"
      code: null
    follow_ups:
      en:
        - "What is replication lag and how handle it?"
        - "How does django-db-router help?"
      ru:
        - "Что такое replication lag и как с ним работать?"
        - "Как помогает django-db-router?"
    expected_points:
