  - id: "django-s-004"
    type: "knowledge"
    difficulty: 4
    tags: ["django", "celery"]
    question:
      text:
        en: "How does Celery integrate with Django? Describe broker, workers, and result backend."
        ru: "Как Celery интегрируется с Django? Опишите broker, workers и result backend."
      code: |
        # tasks.py
        from celery import shared_task

        @shared_task
        def send_welcome_email(user_id):
            ...
    follow_ups:
      en:
        - "What brokers are commonly used (Redis, RabbitMQ)?"
        - "How do you retry failed tasks?"
      ru:
        - "Какие brokers обычно используют (Redis, RabbitMQ)?"
        - "Как повторять упавшие задачи?"
    expected_points:
      - "Celery workers consume tasks from message broker"
      - "shared_task autodiscovers tasks from Django apps"
      - "Result backend stores task outcomes; retries via autoretry_for"

