category: "FastAPI Production"
track: "python"
level: "senior"

description: "Senior FastAPI: deployment, observability, security hardening, and high-load patterns"

questions:
  - id: "fastapi-s-001"
    type: "knowledge"
    difficulty: 4
    tags: ["fastapi", "uvicorn", "gunicorn"]
    question:
      text:
        en: "How do you deploy FastAPI in production with Uvicorn and Gunicorn workers?"
        ru: "Как развернуть FastAPI в продакшене с Uvicorn и Gunicorn workers?"
      code: |
        gunicorn main:app -k uvicorn.workers.UvicornWorker -w 4 --bind 0.0.0.0:8000
    follow_ups:
      en:
        - "How do you choose the number of workers?"
        - "What is the difference between Uvicorn alone vs Gunicorn+Uvicorn?"
      ru:
        - "Как выбрать количество workers?"
        - "Чем Uvicorn отличается от Gunicorn+Uvicorn?"
    expected_points:
      - "UvicornWorker runs ASGI app in each Gunicorn process"
      - "Workers ≈ 2×CPU cores + 1 rule of thumb"
      - "Gunicorn manages process lifecycle and restarts"

  - id: "fastapi-s-002"
