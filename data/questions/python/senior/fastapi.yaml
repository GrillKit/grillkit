        en: "What is graceful shutdown for an ASGI app? How do lifespan and signal handling help?"
        ru: "Что такое graceful shutdown для ASGI-приложения? Как помогают lifespan и обработка сигналов?"
      code: null
    follow_ups:
      en:
        - "What happens to in-flight requests during shutdown?"
        - "How do you drain background tasks?"
      ru:
        - "Что происходит с запросами in-flight при остановке?"
        - "Как завершить background tasks?"
    expected_points:
      - "Stop accepting new connections; finish active requests"
      - "lifespan shutdown closes pools and clients"
      - "Kubernetes SIGTERM requires timeout-aware cleanup"

