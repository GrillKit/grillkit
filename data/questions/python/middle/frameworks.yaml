  - id: "fw-006"
    type: "knowledge"
    difficulty: 3
    tags: ["fastapi-deps", "dependency-injection"]
    question:
      text: "How does FastAPI's dependency injection system work? What can you use it for?"
      code: |
        from fastapi import Depends, FastAPI

        app = FastAPI()

        async def get_db():
            db = await create_connection()
            try:
                yield db
            finally:
                await db.close()

        @app.get("/items")
        async def read_items(db=Depends(get_db)):
            return await db.fetch_items()
    follow_ups:
      - "How do you create reusable dependencies with yield (context managers)?"
      - "Can you nest dependencies? How does the dependency graph work?"
      - "How does FastAPI handle dependency caching per request?"
    expected_points:
      - "Depends() injects the return value of a callable"
      - "Dependencies with yield support setup/teardown (resource management)"
      - "Dependencies can be nested and FastAPI resolves the dependency graph"
      - "Dependencies are cached within a request scope by default"

