  - id: "fastapi-m-008"
    type: "knowledge"
    difficulty: 3
    tags: ["fastapi", "websockets"]
    question:
      text:
        en: "How do WebSocket endpoints work in FastAPI?"
        ru: "Как работают WebSocket-эндпоинты в FastAPI?"
      code: |
        from fastapi import WebSocket

        @app.websocket("/ws")
        async def websocket_endpoint(websocket: WebSocket):
            await websocket.accept()
            await websocket.send_text("hello")
            await websocket.close()
    follow_ups:
      en:
        - "Why do WebSockets require ASGI?"
        - "How do you broadcast messages to multiple clients?"
      ru:
        - "Почему WebSockets требуют ASGI?"
        - "Как рассылать сообщения нескольким клиентам?"
    expected_points:
      - "WebSocket is a long-lived bidirectional connection"
      - "accept(), send_text/send_json, receive, close lifecycle"
      - "Requires ASGI server; manage connection state externally for scale"
