  - id: "django-m-007"
    type: "knowledge"
    difficulty: 3
    tags: ["django", "transactions"]
    question:
      text:
        en: "How do database transactions work in Django? What does atomic() do?"
        ru: "Как работают транзакции БД в Django? Что делает atomic()?"
      code: |
        from django.db import transaction

        with transaction.atomic():
            account.debit(100)
            other.credit(100)
    follow_ups:
      en:
        - "What happens if an exception occurs inside atomic()?"
        - "How does ATOMIC_REQUESTS setting work?"
      ru:
        - "Что происходит при исключении внутри atomic()?"
        - "Как работает настройка ATOMIC_REQUESTS?"
    expected_points:
      - "atomic() wraps operations in a single DB transaction"
      - "Rollback on unhandled exception"
      - "Nested atomic uses savepoints where supported"

