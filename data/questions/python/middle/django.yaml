category: "Django"
track: "python"
level: "middle"

description: "Intermediate Django: ORM optimization, caching, auth, signals, and middleware"

questions:
  - id: "django-m-001"
    type: "knowledge"
    difficulty: 3
    tags: ["django", "select-related", "prefetch"]
    question:
      text:
        en: "What is the N+1 query problem in Django? How do select_related and prefetch_related help?"
        ru: "Что такое проблема N+1 запросов в Django? Как помогают select_related и prefetch_related?"
      code: |
        Article.objects.select_related("author").all()
        Article.objects.prefetch_related("tags").all()
    follow_ups:
      en:
        - "When use select_related vs prefetch_related?"
        - "How do you detect N+1 in development?"
      ru:
        - "Когда select_related, а когда prefetch_related?"
        - "Как обнаружить N+1 при разработке?"
    expected_points:
      - "N+1: one query per related object in a loop"
      - "select_related: SQL JOIN for ForeignKey/OneToOne"
      - "prefetch_related: separate query for ManyToMany/reverse FK"

  - id: "django-m-002"
    type: "knowledge"
    difficulty: 3
    tags: ["django", "queryset", "manager"]
    question:
      text:
        en: "How do custom managers and QuerySets work in Django?"
        ru: "Как работают кастомные managers и QuerySets в Django?"
      code: |
        class PublishedQuerySet(models.QuerySet):
            def published(self):
                return self.filter(status="published")

        class Article(models.Model):
            objects = PublishedQuerySet.as_manager()
    follow_ups:
      en:
        - "What is the difference between Manager and QuerySet methods?"
        - "How do you chain custom queryset methods?"
      ru:
        - "Чем методы Manager отличаются от методов QuerySet?"
        - "Как чейнить кастомные методы queryset?"
    expected_points:
      - "Custom QuerySet adds chainable filters"
      - "Manager is the interface on Model.objects"
      - "as_manager() connects custom QuerySet to default manager"

  - id: "django-m-003"
    type: "knowledge"
    difficulty: 3
    tags: ["django", "signals"]
    question:
      text:
        en: "What are Django signals? When should you use them and when avoid them?"
        ru: "Что такое сигналы Django? Когда их использовать, а когда избегать?"
      code: |
        from django.db.models.signals import post_save
        from django.dispatch import receiver

        @receiver(post_save, sender=User)
        def create_profile(sender, instance, created, **kwargs):
            if created:
                Profile.objects.create(user=instance)
    follow_ups:
      en:
        - "What is the difference between pre_save and post_save?"
        - "Why can signals make debugging harder?"
      ru:
        - "Чем pre_save отличается от post_save?"
        - "Почему сигналы усложняют отладку?"
    expected_points:
      - "Signals decouple side effects from model save/delete"
      - "Use sparingly; implicit flow is hard to trace"
      - "Prefer explicit service layer for complex logic"

  - id: "django-m-004"
    type: "knowledge"
    difficulty: 3
    tags: ["django", "caching"]
    question:
      text:
        en: "How does Django's caching framework work? Compare per-view vs low-level cache API."
        ru: "Как работает кеширование в Django? Сравните per-view и low-level cache API."
      code: |
        from django.views.decorators.cache import cache_page
        from django.core.cache import cache

        @cache_page(60 * 15)
        def my_view(request):
            ...

        cache.set("key", value, timeout=300)
    follow_ups:
      en:
        - "What backends can Django cache use (Redis, Memcached)?"
        - "How do you invalidate cached pages?"
      ru:
        - "Какие backends поддерживает cache Django?"
        - "Как инвалидировать закешированные страницы?"
    expected_points:
      - "cache_page decorator caches full view response"
      - "cache.get/set for fine-grained key-value caching"
      - "Configure CACHES in settings; Redis common in production"

  - id: "django-m-005"
    type: "knowledge"
    difficulty: 3
    tags: ["django", "auth", "permissions"]
    question:
      text:
        en: "How do Django permissions and groups work? How do you check permissions in a view?"
        ru: "Как работают permissions и groups в Django? Как проверить права во view?"
      code: |
        if request.user.has_perm("app.change_article"):
            ...
    follow_ups:
      en:
        - "What is the difference between is_staff and is_superuser?"
        - "How do model permissions get created?"
      ru:
        - "Чем is_staff отличается от is_superuser?"
        - "Как создаются model permissions?"
    expected_points:
      - "Default add/change/delete/view perms per model"
      - "Groups bundle permissions for roles"
      - "@permission_required decorator or user.has_perm()"

