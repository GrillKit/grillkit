  - id: "asyncio-m-008"
    type: "knowledge"
    difficulty: 3
    tags: ["asyncio", "integration"]
    question:
      text:
        en: "How do async HTTP clients and DB drivers integrate with asyncio?"
        ru: "Как async HTTP-клиенты и DB-драйверы интегрируются с asyncio?"
      code: null
    follow_ups:
      en:
        - "Name one async HTTP library and one async PostgreSQL driver."
        - "Why share one ClientSession across requests?"
      ru:
        - "Назовите async HTTP-библиотеку и async PostgreSQL-драйвер."
        - "Зачем переиспользовать один ClientSession?"
