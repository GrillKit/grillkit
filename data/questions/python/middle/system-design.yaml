category: "System Design"
language: "python"
level: "middle"

description: "System design concepts: scaling, databases, caching, CAP theorem, microservices"

questions:
  - id: "sd-001"
    type: "knowledge"
    difficulty: 4
    tags: ["scalability", "horizontal-scaling", "vertical-scaling"]
    question:
      text:
        en: "Explain the difference between horizontal and vertical scaling. When would you choose each?"
        ru: "Объясните разницу между горизонтальным и вертикальным масштабированием. Когда что выбрать?"
      code: null
    follow_ups:
      en:
        - "What are the practical limits of vertical scaling?"
        - "How does horizontal scaling introduce complexity (consistency, coordination)?"
        - "How does load balancing work with horizontal scaling?"
      ru:
        - "Каковы практические ограничения вертикального масштабирования?"
        - "Как горизонтальное масштабирование добавляет сложность (согласованность, координация)?"
        - "Как работает балансировка нагрузки при горизонтальном масштабировании?"
    expected_points:
      - "Vertical: add more resources (CPU, RAM) to a single machine"
      - "Horizontal: add more machines to distribute the load"
      - "Vertical is simpler but has hardware limits and no redundancy"
      - "Horizontal is more scalable but requires stateless design and coordination"

  - id: "sd-002"
    type: "knowledge"
    difficulty: 4
    tags: ["CAP", "consistency", "availability"]
    question:
      text:
        en: "What is the CAP theorem? How does it affect distributed system design?"
        ru: "Что такое теорема CAP? Как она влияет на проектирование распределённых систем?"
      code: null
    follow_ups:
      en:
        - "What trade-offs do you make when choosing CP vs AP?"
        - "How does PACELC extend the CAP theorem?"
        - "How do databases like Cassandra (AP) and PostgreSQL (CP) differ in CAP terms?"
      ru:
        - "Какие компромиссы при выборе CP vs AP?"
        - "Как PACELC расширяет теорему CAP?"
        - "Как базы данных Cassandra (AP) и PostgreSQL (CP) различаются в терминах CAP?"
    expected_points:
      - "CAP: Consistency, Availability, Partition Tolerance — pick two"
      - "In a distributed system, partitions are inevitable"
      - "CP systems sacrifice availability during partitions"
      - "AP systems sacrifice consistency (eventual consistency)"

  - id: "sd-003"
    type: "knowledge"
    difficulty: 4
    tags: ["caching", "redis", "memcached"]
    question:
      text:
        en: "What caching strategies do you know? Compare cache-aside, write-through, and write-behind."
        ru: "Какие стратегии кеширования вы знаете? Сравните cache-aside, write-through и write-behind."
      code: null
    follow_ups:
      en:
        - "What is cache invalidation and why is it hard?"
        - "How does Redis differ from Memcached?"
        - "What is a cache stampede and how do you prevent it?"
      ru:
        - "Что такое инвалидация кеша и почему это сложно?"
        - "Чем Redis отличается от Memcached?"
        - "Что такое cache stampede и как его предотвратить?"
    expected_points:
      - "Cache-aside: app checks cache first, loads from DB on miss"
      - "Write-through: writes go to cache and DB synchronously"
      - "Write-behind: writes go to cache, async writes to DB"
      - "Redis supports persistence, data structures, pub/sub; Memcached is simpler"

  - id: "sd-004"
    type: "knowledge"
    difficulty: 4
    tags: ["microservices", "service-boundaries"]
    question:
      text:
        en: "How do you decompose a monolith into microservices? What are the key considerations?"
        ru: "Как декомпозировать монолит в микросервисы? Какие ключевые аспекты учесть?"
      code: null
    follow_ups:
      en:
        - "How do you handle inter-service communication (sync vs async)?"
        - "What is the difference between orchestration and choreography?"
        - "How do you handle distributed transactions (saga pattern)?"
      ru:
        - "Как организовать межсервисное взаимодействие (синхронное vs асинхронное)?"
        - "В чём разница между оркестрацией и хореографией?"
        - "Как работать с распределёнными транзакциями (saga pattern)?"
    expected_points:
      - "Decompose by bounded contexts (DDD) — each service owns its domain data"
      - "Prefer async communication via message brokers for loose coupling"
      - "Orchestration: central coordinator; Choreography: event-driven collaboration"
      - "Saga pattern manages distributed transactions with compensating actions"

  - id: "sd-005"
    type: "knowledge"
    difficulty: 4
    tags: ["message-broker", "rabbitmq", "kafka"]
    question:
      text:
        en: "Compare RabbitMQ and Apache Kafka. When would you choose each?"
        ru: "Сравните RabbitMQ и Apache Kafka. Когда что выбрать?"
      code: null
    follow_ups:
      en:
        - "What is the difference between a message queue and a stream?"
        - "How does Kafka's log-based storage enable replayability?"
        - "What is consumer group in Kafka?"
      ru:
        - "В чём разница между очередью сообщений и потоком?"
        - "Как логовое хранение Kafka обеспечивает воспроизводимость?"
        - "Что такое consumer group в Kafka?"
    expected_points:
      - "RabbitMQ: message broker with queues, exchanges, and routing"
      - "Kafka: distributed event streaming platform with append-only log"
      - "Kafka excels at high-throughput event streaming and replay"
      - "RabbitMQ is better for task queues and complex routing"

  - id: "sd-006"
    type: "knowledge"
    difficulty: 4
    tags: ["load-balancing", "reverse-proxy"]
    question:
      text:
        en: "What load balancing algorithms exist and when would you use each?"
        ru: "Какие алгоритмы балансировки нагрузки существуют и когда их использовать?"
      code: null
    follow_ups:
      en:
        - "What is the difference between L4 and L7 load balancing?"
        - "How does a reverse proxy (NGINX, HAProxy) fit into a system design?"
        - "How do you handle session affinity (sticky sessions) vs stateless design?"
      ru:
        - "В чём разница между L4 и L7 балансировкой?"
        - "Как reverse proxy (NGINX, HAProxy) вписывается в архитектуру системы?"
        - "Как работать с привязкой сессий (sticky sessions) vs stateless дизайн?"
    expected_points:
      - "Round robin, least connections, IP hash, weighted distribution"
      - "L4 balances on TCP/UDP; L7 inspects HTTP headers and content"
      - "Reverse proxy: TLS termination, caching, rate limiting, routing"
      - "Prefer stateless design to avoid session affinity limitations"

  - id: "sd-007"
    type: "knowledge"
    difficulty: 4
    tags: ["rate-limiting", "throttling"]
    question:
      text:
        en: "How do you implement rate limiting in a distributed system? Compare token bucket, leaky bucket, and sliding window."
        ru: "Как реализовать ограничение скорости (rate limiting) в распределённой системе? Сравните token bucket, leaky bucket и sliding window."
      code: null
    follow_ups:
      en:
        - "Where should rate limiting be applied (API gateway, app layer)?"
        - "How do you handle rate limiting across multiple servers?"
        - "What HTTP headers are standard for rate limiting responses?"
      ru:
        - "Где применять rate limiting (API gateway, уровень приложения)?"
        - "Как организовать rate limiting на нескольких серверах?"
        - "Какие HTTP-заголовки стандартны для ответов rate limiting?"
    expected_points:
      - "Token bucket: refill tokens over time, allow burst up to capacity"
      - "Leaky bucket: process requests at constant rate, queue overflow drops"
      - "Sliding window: track requests in a time window for precise control"
      - "Use Redis for distributed rate limiting across instances"
