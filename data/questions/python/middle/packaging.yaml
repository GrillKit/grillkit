category: "Packaging and Distribution"
track: "python"
level: "middle"

description: "Python packaging: pyproject.toml, setuptools, wheels, dependency management, and publishing"

questions:
  - id: "pkg-001"
    type: "knowledge"
    difficulty: 3
    tags: ["pyproject.toml", "build-system"]
    question:
      text:
        en: "What is pyproject.toml? How does it replace setup.py and setup.cfg?"
        ru: "Что такое pyproject.toml? Как он заменяет setup.py и setup.cfg?"
      code: null
    follow_ups:
      en:
        - "What is the difference between build-system and project in pyproject.toml?"
        - "What build backends exist (setuptools, flit, poetry, hatch)?"
        - "How do you define dependencies in pyproject.toml?"
      ru:
        - "В чём разница между build-system и project в pyproject.toml?"
        - "Какие существуют сборочные бэкенды (setuptools, flit, poetry, hatch)?"
        - "Как определить зависимости в pyproject.toml?"
    expected_points:
      - "pyproject.toml is the standard Python project metadata file (PEP 517/518)"
      - "build-system specifies the build backend and requirements"
      - "project section defines metadata: name, version, dependencies"
      - "Can specify optional dependencies with [project.optional-dependencies]"

  - id: "pkg-002"
    type: "knowledge"
    difficulty: 3
    tags: ["uv", "pip", "poetry"]
    question:
      text:
        en: "Compare pip, pipenv, poetry, and uv for dependency management. What are the trade-offs?"
        ru: "Сравните pip, pipenv, poetry и uv для управления зависимостями. Каковы компромиссы?"
      code: null
    follow_ups:
      en:
        - "What makes uv faster than pip?"
        - "How does poetry manage virtual environments?"
        - "What is a lock file and why is it important?"
      ru:
        - "Что делает uv быстрее pip?"
        - "Как poetry управляет виртуальными окружениями?"
        - "Что такое lock-файл и почему он важен?"
    expected_points:
      - "pip: simplest, no lock file by default, requirements.txt"
      - "Poetry: pyproject.toml native, lock file, virtual env management"
      - "uv: Rust-based, extremely fast, pip-compatible, lock file support"
      - "Lock files ensure reproducible installs across environments"

  - id: "pkg-003"
    type: "knowledge"
    difficulty: 3
    tags: ["wheels", "sdist"]
    question:
      text:
        en: "What is the difference between a source distribution (sdist) and a wheel? How are they built?"
        ru: "В чём разница между исходным дистрибутивом (sdist) и wheel? Как они собираются?"
      code: null
    follow_ups:
      en:
        - "Why are wheels preferred for distribution?"
        - "What is a pure Python wheel vs a platform-specific wheel?"
        - "How do you build wheels with C extensions?"
      ru:
        - "Почему wheel предпочтительнее для распространения?"
        - "Чем отличается чистый Python wheel от платформо-зависимого?"
        - "Как собирать wheel с C-расширениями?"
    expected_points:
      - "sdist: source code + setup script, requires build step on install"
      - "wheel: pre-built archive, faster install (no compilation)"
      - "Wheels are preferred — pip installs them directly"
      - "cibuildwheel automates building wheels for multiple platforms"

  - id: "pkg-004"
    type: "knowledge"
    difficulty: 3
    tags: ["publishing", "pypi"]
    question:
      text:
        en: "How do you publish a Python package to PyPI? What are the steps?"
        ru: "Как опубликовать Python-пакет в PyPI? Какие шаги нужно выполнить?"
      code: null
    follow_ups:
      en:
        - "What is the difference between PyPI and TestPyPI?"
        - "How do API tokens for PyPI publishing work?"
        - "What should you include in a README and CHANGELOG for a package?"
      ru:
        - "В чём разница между PyPI и TestPyPI?"
        - "Как работают API-токены для публикации в PyPI?"
        - "Что должно быть в README и CHANGELOG пакета?"
    expected_points:
      - "Build: python -m build creates sdist and wheel"
      - "Publish: twine upload dist/*"
      - "Use TestPyPI first to verify"
      - "Use API tokens instead of username/password for CI/CD"

  - id: "pkg-005"
    type: "knowledge"
    difficulty: 3
    tags: ["entry-points", "console-scripts"]
    question:
      text:
        en: "How do you create CLI entry points for a Python package? What are console_scripts?"
        ru: "Как создать CLI-точки входа для Python-пакета? Что такое console_scripts?"
      code: null
    follow_ups:
      en:
        - "How do entry points work with the plugin system (entry point groups)?"
        - "How does pip use entry points internally?"
        - "What is the difference between console_scripts and gui_scripts?"
      ru:
        - "Как точки входа работают с системой плагинов (entry point groups)?"
        - "Как pip использует точки входа внутри?"
        - "В чём разница между console_scripts и gui_scripts?"
    expected_points:
      - "console_scripts in pyproject.toml creates CLI commands"
      - "Entry point groups allow third-party plugins"
      - "Example: [project.scripts] mycli = 'mypackage.cli:main'"
      - "pip generates executable wrappers in PATH"

  - id: "pkg-006"
    type: "knowledge"
    difficulty: 3
    tags: ["namespace-packages", "implicit-namespace"]
    question:
      text:
        en: "What are namespace packages in Python? How do implicit namespace packages work?"
        ru: "Что такое namespace packages в Python? Как работают неявные namespace packages?"
      code: null
    follow_ups:
      en:
        - "What is the difference between pkgutil-style and pkg_resources-style?"
        - "When would you need namespace packages (e.g., google.cloud.*)?"
      ru:
        - "В чём разница между pkgutil-style и pkg_resources-style?"
        - "Когда нужны namespace packages (например, google.cloud.*)?"
    expected_points:
      - "Namespace packages allow splitting packages across directories"
      - "Implicit namespace packages (PEP 420): directory without __init__.py"
      - "Multiple distributions can contribute to the same namespace"
      - "Used by large ecosystems (Google, Apache) for modular sub-packages"
