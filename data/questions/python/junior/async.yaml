  - id: "async-003"
    type: "knowledge"
    difficulty: 3
    tags: ["concurrent-tasks", "asyncio.gather"]
    question:
      text: "How do you run multiple coroutines concurrently? Compare asyncio.gather, asyncio.create_task, and asyncio.TaskGroup."
      code: |
        async def fetch(url: str) -> str:
            await asyncio.sleep(1)
            return f"Response from {url}Response from {url}"

        async def main():
            urls = ["url1", "url2", "url3"]
            tasks = [asyncio.create_task(fetch(url)) for url in urls]
            results = await asyncio.gather(*tasks)
            print(results)
    follow_ups:
      - "What happens if one task in gather raises an exception?"
      - "What is asyncio.TaskGroup (Python 3.11+) and how is it different?"
    expected_points:
      - "asyncio.gather runs coroutines concurrently, returns list of results"
      - "asyncio.create_task schedules a coroutine as a Task"
      - "TaskGroup (3.11+) provides structured concurrency with better error handling"
      - "If one task fails in gather, others continue by default (return_exceptions=True)"

  - id: "async-004"
    type: "knowledge"
    difficulty: 2
    tags: ["async-with", "async-generator"]
    question:
      text: "What are asynchronous context managers and asynchronous generators? Give examples."
      code: |
        class AsyncResource:
            async def __aenter__(self):
                await self.connect()
                return self

            async def __aexit__(self, *args):
                await self.disconnect()

        # Usage
        async with AsyncResource() as res:
            await res.do_work()
    follow_ups:
      - "What is the difference between __aenter__/__aexit__ and __enter__/__exit__?"
      - "How do async generators work with 'async for'?"
    expected_points:
      - "Async context managers use __aenter__ and __aexit__"
      - "Usage: async with resource as r:"
      - "Async generators use 'yield' in async functions"
      - "Usage: async for item in async_generator():"

  - id: "async-005"
    type: "knowledge"
    difficulty: 3
    tags: ["GIL", "parallelism", "blocking-code"]
    question:
      text: "How do you handle blocking I/O code in asyncio? What is run_in_executor?"
      code: |
        import asyncio
        import time

        async def main():
            loop = asyncio.get_running_loop()
            # Run blocking code in thread pool
            result = await loop.run_in_executor(
                None, time.sleep, 2
            )
            print("Done")
    follow_ups:
      - "Why does blocking the event loop matter?"
      - "What is the difference between asyncio.sleep and time.sleep inside async code?"
    expected_points:
      - "Blocking calls (time.sleep, requests.get) block the event loop"
      - "run_in_executor offloads blocking code to a thread or process pool"
      - "Always use async libraries (aiohttp, asyncpg) or run_in_executor"
      - "Never call time.sleep() inside async code — use asyncio.sleep()"

