      - "gather runs awaitables concurrently and collects results"
      - "Use gather for fan-out/fan-in; create_task for fire-and-forget or manual control"

  - id: "async-010"
    type: "knowledge"
    difficulty: 2
    tags: ["async", "blocking", "antipattern"]
    question:
      text:
        en: "Why should you avoid time.sleep() and blocking I/O inside async def functions?"
        ru: "Почему нельзя вызывать time.sleep() и блокирующий I/O внутри async def?"
      code: |
        import asyncio
        import time

        async def bad():
            time.sleep(1)  # blocks entire event loop!

        async def good():
            await asyncio.sleep(1)  # yields control to other tasks
    follow_ups:
