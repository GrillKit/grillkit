questions:
  - id: "async-001"
    type: "knowledge"
    difficulty: 2
    tags: ["async-await", "coroutines"]
    question:
      text: "What are coroutines in Python? How do async and await work?"
      code: |
        import asyncio

        async def fetch_data():
            await asyncio.sleep(1)
            return {"data": "ok"}

        async def main():
            result = await fetch_data()
            print(result)

        asyncio.run(main())
    follow_ups:
      - "What is the difference between a coroutine function and a coroutine object?"
      - "What happens if you call an async function without await?"
    expected_points:
      - "async def defines a coroutine function; calling it returns a coroutine object"
      - "await suspends execution until the awaited coroutine completes"
      - "Coroutines must be executed within an event loop"
      - "Calling async function without await returns a coroutine object, not result"

