questions:
  - id: "async-001"
    type: "knowledge"
    difficulty: 2
    tags: ["async", "gil", "performance"]
    
    question:
      text:
        en: "What is the GIL (Global Interpreter Lock) and why is it needed? Does it affect the execution of asynchronous code?"
        ru: "Что такое GIL (Global Interpreter Lock) и для чего он нужен? Влияет ли он на выполнение асинхронного кода?"
      code: |
        # GIL prevents multiple native threads from executing Python bytecodes
        # This affects CPU-bound multithreading but not I/O-bound
        
        import threading
        import time
        
        # CPU-bound task (affected by GIL)
        def cpu_bound():
            result = 0
            for i in range(10**7):
                result += i
            return result
        
        # I/O-bound task (less affected)
        def io_bound():
            time.sleep(1)  # Simulate I/O
            return "done"
        
        # Async code (not affected in the same way)
        import asyncio
        
        async def async_task():
            await asyncio.sleep(1)
            return "async done"
    
    follow_ups:
      en:
        - "How does the GIL affect multi-threaded Python programs?"
        - "What are the alternatives to overcome GIL limitations?"
        - "How does async/await work with the GIL?"
      ru:
        - "Как GIL влияет на многопоточные Python программы?"
        - "Какие есть альтернативы для преодоления ограничений GIL?"
        - "Как async/await работает с GIL?"
    
    expected_points:
      - "GIL is a mutex that protects Python object access"
      - "Prevents multiple threads from executing Python bytecode simultaneously"
      - "Needed for CPython's memory management (reference counting)"
      - "Affects CPU-bound threads but not I/O-bound threads"
      - "Async code runs in single thread, GIL not a bottleneck"
      - "Async tasks release GIL during await on I/O"
      - "Multiprocessing bypasses GIL (separate processes)"
      - "Alternative Python implementations (Jython, IronPython) don't have GIL"

  - id: "async-002"
    type: "knowledge"
    difficulty: 2
    tags: ["async", "concurrency", "parallelism"]
    
    question:
      text:
        en: "What are concurrency and parallelism? What problems are solved with multithreading, multiprocessing, and asynchrony?"
        ru: "Что такое конкурентность (concurrency) и параллельность (parallelism)? Какие задачи решаются с помощью многопоточности, многопроцессности и асинхронности?"
      code: |
        # Concurrency vs Parallelism
        
        # Concurrency: multiple tasks make progress
        # (not necessarily at same time)
        async def concurrent_tasks():
            task1 = asyncio.create_task(fetch_url(url1))
            task2 = asyncio.create_task(fetch_url(url2))
            await asyncio.gather(task1, task2)
        
        # Parallelism: multiple tasks execute simultaneously
        # (requires multiple CPU cores)
        from multiprocessing import Pool
        
        def parallel_tasks():
            with Pool(processes=4) as pool:
                results = pool.map(process_data, large_dataset)
        
        # Multithreading: I/O-bound tasks, GIL limited
        # Multiprocessing: CPU-bound tasks, bypasses GIL
        # Asynchrony: I/O-bound, single-threaded concurrency
    
    follow_ups:
      en:
        - "What is the difference between concurrent and parallel execution?"
        - "When should you use threading vs multiprocessing vs asyncio?"
        - "What are the trade-offs of each approach?"
      ru:
        - "В чём разница между конкурентным и параллельным выполнением?"
        - "Когда следует использовать threading, multiprocessing или asyncio?"
        - "Каковы компромиссы каждого подхода?"
    
    expected_points:
      - "Concurrency: multiple tasks making progress"
      - "Parallelism: multiple tasks executing simultaneously"
      - "Multithreading: I/O-bound tasks, shares memory, GIL limited"
      - "Multiprocessing: CPU-bound tasks, separate memory, no GIL"
      - "Asynchrony: I/O-bound, single-threaded, cooperative multitasking"
      - "Threading: good for I/O with blocking calls"
      - "Multiprocessing: good for CPU-intensive work"
      - "Asyncio: good for high-concurrency I/O"

  - id: "async-003"
    type: "knowledge"
    difficulty: 2
    tags: ["async", "coroutines", "functions"]
    
    question:
      text:
        en: "What is a coroutine and how does it differ from an ordinary function?"
        ru: "Что такое корутина (coroutine) и чем она отличается от обычной функции?"
      code: |
        # Regular function
        def regular_function():
            print("Start")
            time.sleep(1)  # Blocks entire thread
            print("End")
            return "done"
        
        # Coroutine (async function)
        async def coroutine_function():
            print("Start")
            await asyncio.sleep(1)  # Non-blocking
            print("End")
            return "done"
        
        # Calling them differently
        result = regular_function()  # Direct call
        
        # Coroutines need to be awaited
        result = await coroutine_function()
        
        # Or run in event loop
        result = asyncio.run(coroutine_function())
    
    follow_ups:
      en:
        - "What happens if you call a coroutine without await?"
        - "How do you convert a regular function to a coroutine?"
        - "What is the difference between async def and @asyncio.coroutine?"
      ru:
        - "Что произойдёт, если вызвать корутину без await?"
        - "Как преобразовать обычную функцию в корутину?"
        - "В чём разница между async def и @asyncio.coroutine?"
    
    expected_points:
      - "Coroutine: async function that can be paused/resumed"
      - "Defined with async def instead of def"
      - "Contains await expressions"
      - "Returns a coroutine object when called (not executed)"
      - "Needs await or asyncio.run() to execute"
      - "Can pause execution without blocking thread"
      - "Regular functions run to completion"
      - "Coroutines enable cooperative multitasking"
      - "Use await to pause and wait for result"

  - id: "async-004"
    type: "knowledge"
    difficulty: 2
    tags: ["async", "event-loop", "asyncio"]
    
    question:
      text:
        en: "What is an event loop and how does it manage the execution of asynchronous tasks?"
        ru: "Что такое event loop (цикл событий) и как он управляет выполнением асинхронных задач?"
      code: |
        import asyncio
        
        # Event loop manages async tasks
        async def task1():
            print("Task 1 start")
            await asyncio.sleep(1)
            print("Task 1 end")
        
        async def task2():
            print("Task 2 start")
            await asyncio.sleep(0.5)
            print("Task 2 end")
        
        async def main():
            # Create tasks
            t1 = asyncio.create_task(task1())
            t2 = asyncio.create_task(task2())
            
            # Event loop manages execution
            await asyncio.gather(t1, t2)
        
        # Run event loop
        asyncio.run(main())
        
        # Manual event loop (older style)
        # loop = asyncio.get_event_loop()
        # loop.run_until_complete(main())
        # loop.close()
    
    follow_ups:
