        - "What is the role of the event loop in asyncio?"
        - "How does the event loop handle I/O operations?"
        - "Can you have multiple event loops?"
      ru:
        - "Какова роль цикла событий в asyncio?"
        - "Как цикл событий обрабатывает операции ввода-вывода?"
        - "Можно ли иметь несколько циклов событий?"
    
    expected_points:
      - "Event loop: core of async programming, manages task execution"
      - "Schedules coroutines, handles I/O, runs callbacks"
      - "Single-threaded, runs tasks cooperatively"
      - "Tasks yield control with await"
      - "Event loop switches between ready tasks"
