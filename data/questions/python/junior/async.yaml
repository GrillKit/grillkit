        - "How do you call blocking code from async code safely?"
        - "What symptom indicates the event loop is blocked?"
      ru:
        - "Как безопасно вызвать блокирующий код из async?"
        - "Какой симптом указывает на блокировку event loop?"
    expected_points:
      - "Blocking calls freeze the single-threaded event loop"
      - "Other coroutines cannot run until blocking finishes"
      - "Use await asyncio.sleep or run_in_executor for blocking work"

