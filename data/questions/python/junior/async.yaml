  - id: "async-005"
    type: "knowledge"
    difficulty: 2
    tags: ["async", "generators", "coroutines"]
    
    question:
      text:
        en: "How are generators related to asynchronous code?"
        ru: "Как генераторы (generators) связаны с асинхронным кодом?"
      code: |
        # Generator (synchronous)
        def count_up_to(n):
            i = 0
            while i < n:
                yield i  # Pauses here
                i += 1
        
        # Using generator
        for num in count_up_to(5):
            print(num)  # 0, 1, 2, 3, 4
        
        # Async generator (Python 3.6+)
        async def async_count_up_to(n):
            i = 0
            while i < n:
                yield i  # Async pause
                i += 1
                await asyncio.sleep(0.1)
        
        # Using async generator
        async for num in async_count_up_to(5):
            print(num)
        
        # Historical: generators were basis for async/await
        # yield from -> await
        # @asyncio.coroutine -> async def
    
    follow_ups:
      en:
        - "What is the difference between generators and async generators?"
        - "How did generators influence the development of async/await?"
        - "What is yield from and how does it relate to await?"
      ru:
        - "В чём разница между генераторами и async генераторами?"
        - "Как генераторы повлияли на развитие async/await?"
        - "Что такое yield from и как это связано с await?"
    
    expected_points:
      - "Generators can pause/resume with yield"
      - "Async/await syntax inspired by generators"
      - "yield from was precursor to await"
      - "@asyncio.coroutine decorator used generators"
      - "Async generators (async def with yield) for async iteration"
      - "Both enable pausing execution"
      - "Generators: synchronous, for iteration"
      - "Coroutines: asynchronous, for concurrency"
      - "Similar mechanics, different use cases"

  - id: "async-006"
    type: "knowledge"
    difficulty: 2
    tags: ["async", "tasks", "execution"]
    
    question:
      text:
        en: "How to run sequential, background, and group execution of asynchronous tasks? What are their differences?"
        ru: "Как выполнить последовательный, фоновый и групповой запуск асинхронных задач? В чём их различия?"
      code: |
        import asyncio
        
        async def task(name, delay):
            print(f"{name} starting")
            await asyncio.sleep(delay)
            print(f"{name} finished")
            return f"{name} result"
        
        # Sequential execution
        async def sequential():
            result1 = await task("Task1", 1)
            result2 = await task("Task2", 1)
            return [result1, result2]  # Takes 2 seconds
        
        # Concurrent execution (group)
        async def concurrent():
            # Using gather
            results = await asyncio.gather(
                task("Task1", 1),
                task("Task2", 1)
            )  # Takes 1 second
            return results
        
        # Background task (fire and forget)
        async def background():
            # create_task starts task without waiting
            bg_task = asyncio.create_task(task("Background", 2))
            # Do other work
            await asyncio.sleep(1)
            print("Main work done")
            # Optionally wait for background task
            await bg_task
        
        # Wait for first completed
        async def wait_first():
            done, pending = await asyncio.wait(
                [task("Fast", 0.5), task("Slow", 2)],
                return_when=asyncio.FIRST_COMPLETED
            )
            return done, pending
    
    follow_ups:
      en:
        - "What is the difference between create_task and ensure_future?"
        - "How does asyncio.gather differ from asyncio.wait?"
        - "When should you use background tasks?"
      ru:
        - "В чём разница между create_task и ensure_future?"
        - "Чем asyncio.gather отличается от asyncio.wait?"
        - "Когда следует использовать фоновые задачи?"
    
    expected_points:
      - "Sequential: await each task, one after another"
      - "Concurrent: run multiple tasks together (gather, wait)"
      - "Background: start task without waiting (create_task)"
      - "asyncio.gather: wait for all tasks, get results"
      - "asyncio.wait: more control (FIRST_COMPLETED, etc.)"
      - "asyncio.create_task: schedule task, returns Task object"
      - "Background tasks run independently"
      - "Group execution for parallel I/O operations"
      - "Choose based on dependencies and requirements"

  - id: "async-007"
    type: "knowledge"
    difficulty: 2
    tags: ["async", "iterators", "context-managers"]
    
    question:
      text:
        en: "What is an asynchronous iterator and an asynchronous context manager?"
        ru: "Что такое асинхронный итератор и асинхронный контекстный менеджер?"
      code: |
        import asyncio
        
        # Async iterator
        class AsyncCounter:
            def __init__(self, stop):
                self.current = 0
                self.stop = stop
            
            def __aiter__(self):
                return self
            
            async def __anext__(self):
                if self.current >= self.stop:
                    raise StopAsyncIteration
                await asyncio.sleep(0.1)  # Async operation
                self.current += 1
                return self.current - 1
        
        # Using async iterator
        async def use_async_iterator():
            async for value in AsyncCounter(5):
                print(value)
        
        # Async context manager
        class AsyncDatabaseConnection:
            async def __aenter__(self):
                print("Connecting to database...")
                await asyncio.sleep(0.5)
                self.connection = "database_connection"
                return self.connection
            
            async def __aexit__(self, exc_type, exc_val, exc_tb):
                print("Closing database connection...")
                await asyncio.sleep(0.2)
                self.connection = None
        
        # Using async context manager
        async def use_async_context():
            async with AsyncDatabaseConnection() as conn:
                print(f"Using connection: {conn}")
                await asyncio.sleep(1)
    
    follow_ups:
      en:
        - "What methods define an async iterator?"
        - "What methods define an async context manager?"
        - "When would you use async for vs regular for?"
      ru:
        - "Какие методы определяют async итератор?"
        - "Какие методы определяют async контекстный менеджер?"
        - "Когда использовать async for вместо обычного for?"
    
    expected_points:
      - "Async iterator: implements __aiter__ and __anext__"
      - "Used with async for loop"
      - "Async context manager: implements __aenter__ and __aexit__"
      - "Used with async with statement"
      - "Both support await in their methods"
      - "Use when iteration or context involves async operations"
      - "Regular for/with blocks event loop"
      - "Async versions allow other tasks to run"
      - "Essential for async database clients, HTTP clients, etc."

  - id: "async-008"
    type: "knowledge"
    difficulty: 2
    tags: ["async", "timeout", "asyncio"]
    
    question:
      text:
        en: "How to limit the execution time of a coroutine (timeout)?"
        ru: "Как можно ограничить время выполнения корутины (тайм-аут)?"
      code: |
        import asyncio
        
        async def slow_operation():
            await asyncio.sleep(5)  # Simulate slow operation
            return "done"
        
        # Method 1: asyncio.wait_for
        async def with_timeout():
            try:
                result = await asyncio.wait_for(slow_operation(), timeout=2.0)
                return result
            except asyncio.TimeoutError:
                return "timeout"
        
        # Method 2: asyncio.wait with timeout
        async def with_wait_timeout():
            task = asyncio.create_task(slow_operation())
            try:
                done, pending = await asyncio.wait([task], timeout=2.0)
                if task in done:
                    return task.result()
                else:
                    task.cancel()
                    return "timeout"
            except asyncio.CancelledError:
                return "cancelled"
        
        # Method 3: asyncio.timeout context manager (Python 3.11+)
        async def with_timeout_context():
            try:
                async with asyncio.timeout(2.0):
                    return await slow_operation()
            except TimeoutError:
                return "timeout"
        
        # Method 4: shield from cancellation
        async def with_shield():
            try:
                # shield protects from cancellation during cleanup
                result = await asyncio.wait_for(
                    asyncio.shield(slow_operation()),
                    timeout=2.0
                )
                return result
            except asyncio.TimeoutError:
                # Task continues in background
                return "timeout but task continues"
    
    follow_ups:
      en:
        - "What is the difference between wait_for and wait with timeout?"
        - "How does asyncio.shield work with timeouts?"
        - "What happens to the timed-out coroutine?"
      ru:
        - "В чём разница между wait_for и wait с таймаутом?"
        - "Как работает asyncio.shield с таймаутами?"
        - "Что происходит с корутиной при таймауте?"
    
    expected_points:
      - "asyncio.wait_for(coro, timeout): raises TimeoutError"
      - "asyncio.wait(tasks, timeout): returns done/pending sets"
      - "asyncio.timeout() context manager (Python 3.11+)"
      - "Timeout cancels the task with CancelledError"
      - "asyncio.shield() protects from cancellation"
      - "Important for network requests, external APIs"
      - "Prevents hanging indefinitely on slow operations"
      - "Clean up resources after timeout"

  - id: "async-009"
    type: "knowledge"
    difficulty: 2
    tags: ["async", "gather", "create_task"]
    question:
      text:
        en: "What is the difference between asyncio.create_task() and asyncio.gather()? When would you use each?"
        ru: "В чём разница между asyncio.create_task() и asyncio.gather()? Когда использовать каждый?"
      code: |
        import asyncio

        async def fetch(url):
            await asyncio.sleep(0.1)
            return url

        async def main():
            t1 = asyncio.create_task(fetch("a"))
            t2 = asyncio.create_task(fetch("b"))
            results = await asyncio.gather(t1, t2)
            return results
