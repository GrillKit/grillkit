  - id: "func-009"
    type: "knowledge"
    difficulty: 2
    tags: ["scope", "closure", "LEGB"]
    question:
      text:
        en: "How does variable scope work in Python? What is a closure and how is it formed?"
        ru: "Как работает область видимости переменных в Python? Что такое замыкание (closure) и как оно формируется?"
      code: null
    follow_ups:
      en:
        - "What is the LEGB rule in Python?"
        - "How does the 'nonlocal' keyword work with closures?"
        - "What is a practical use case for closures?"
      ru:
        - "Что такое правило LEGB в Python?"
        - "Как работает ключевое слово 'nonlocal' с замыканиями?"
