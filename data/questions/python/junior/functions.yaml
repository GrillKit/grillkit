category: "Functions"
track: "python"
level: "junior"

description: "Python functions: parameters, return values, scoping, and advanced function concepts"

questions:
  - id: "func-001"
    type: "knowledge"
    difficulty: 1
    tags: ["args", "kwargs", "parameters"]
    question:
      text:
        en: "Explain the difference between positional arguments, keyword arguments, *args, and **kwargs in Python?"
        ru: "Объясните разницу между позиционными аргументами, именованными аргументами, *args и **kwargs в Python."
      code: null
    follow_ups:
      en:
        - "What is the order of parameters in a function definition?"
        - "What happens if you pass more positional arguments than parameters?"
      ru:
        - "Каков порядок параметров в определении функции?"
        - "Что произойдёт, если передать больше позиционных аргументов, чем параметров?"
    expected_points:
      - "Positional args are matched by position"
      - "Keyword args are passed as name=value"
      - "*args captures extra positional args as a tuple"
      - "**kwargs captures extra keyword args as a dict"
      - "Order: normal, *args, defaults, **kwargs"

  - id: "func-002"
    type: "knowledge"
    difficulty: 2
    tags: ["lambdas", "anonymous-functions"]
    question:
      text:
        en: "What are lambda functions in Python? When should you use them vs regular named functions?"
        ru: "Что такое лямбда-функции в Python? Когда их использовать вместо обычных именованных функций?"
      code: |
        square = lambda x: x ** 2
        squares = list(map(lambda x: x ** 2, [1, 2, 3]))
    follow_ups:
      en:
        - "What are the limitations of lambda functions?"
        - "Can a lambda contain statements or multiple expressions?"
      ru:
        - "Какие ограничения у лямбда-функций?"
        - "Может ли лямбда содержать инструкции или несколько выражений?"
    expected_points:
      - "Lambda: anonymous single-expression function"
      - "Useful for short callbacks and key functions (sort, filter, map)"
      - "Limitation: single expression only, no statements or annotations"
      - "Prefer named functions for complex logic"

  - id: "func-003"
    type: "knowledge"
    difficulty: 2
    tags: ["scope", "LEGB", "closures"]
    question:
      text:
        en: "Explain Python's LEGB scoping rule. How does it affect variable lookup?"
        ru: "Объясните правило областей видимости LEGB в Python. Как оно влияет на поиск переменных?"
      code: |
        x = "global"
        def outer():
            x = "enclosing"
            def inner():
                x = "local"
                print(x)
            inner()
        outer()
    follow_ups:
      en:
        - "What do 'global' and 'nonlocal' keywords do?"
        - "How does scoping work for nested functions?"
      ru:
        - "Что делают ключевые слова 'global' и 'nonlocal'?"
        - "Как работает область видимости для вложенных функций?"
    expected_points:
      - "LEGB: Local, Enclosing, Global, Built-in"
      - "Python searches scopes in this order"
      - "'global' declares a variable as module-level"
      - "'nonlocal' refers to the enclosing scope (not global, not local)"

  - id: "func-004"
    type: "knowledge"
    difficulty: 2
    tags: ["default-arguments", "mutable-defaults"]
    question:
      text:
        en: "What is the problem with mutable default arguments in Python? Why can it lead to bugs?"
        ru: "В чём проблема изменяемых аргументов по умолчанию в Python? Почему это может приводить к ошибкам?"
      code: |
        def add_item(item, items=[]):
            items.append(item)
            return items

        print(add_item(1))  # [1]
        print(add_item(2))  # [1, 2] — unexpected!
    follow_ups:
      en:
        - "How can you safely use mutable defaults?"
        - "Why is None commonly used as a sentinel for mutable defaults?"
      ru:
        - "Как безопасно использовать изменяемые значения по умолчанию?"
        - "Почему None часто используется как маркер для изменяемых значений по умолчанию?"
    expected_points:
      - "Default arguments are evaluated once at function definition time"
      - "Mutable defaults are reused across all calls"
      - "Fix: use None as default and create a new mutable inside"

  - id: "func-005"
    type: "knowledge"
    difficulty: 2
    tags: ["return", "multiple-return", "None"]
    question:
      text:
        en: "How does the 'return' statement work in Python? What does a function return if there's no return?"
        ru: "Как работает оператор 'return' в Python? Что возвращает функция, если в ней нет return?"
      code: null
    follow_ups:
      en:
        - "How can you return multiple values from a function?"
        - "What is the difference between 'return' and 'yield'?"
      ru:
        - "Как вернуть несколько значений из функции?"
        - "В чём разница между 'return' и 'yield'?"
    expected_points:
