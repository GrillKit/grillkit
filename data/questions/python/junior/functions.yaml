    question:
      text:
        en: "Define a decorator. What can act as a decorator and to which elements (functions, methods, classes) can it be applied?"
        ru: "Дайте определение декоратора. Что может выступать в роли декоратора и к каким элементам (функциям, методам, классам) он может быть применён?"
      code: null
    follow_ups:
      en:
        - "How does the @decorator syntax work under the hood?"
        - "What is the difference between function decorators and class decorators?"
        - "How can you create a decorator that accepts arguments?"
      ru:
        - "Как работает синтаксис @декоратор под капотом?"
        - "В чём разница между декораторами функций и декораторами классов?"
        - "Как создать декоратор, который принимает аргументы?"
    expected_points:
