  - id: "func-006"
    type: "coding"
    difficulty: 2
    tags: ["docstrings", "annotations"]
    question:
      text:
        en: "What are function annotations (type hints) in Python? How do you document a function properly?"
        ru: "Что такое аннотации функций (type hints) в Python? Как правильно документировать функцию?"
      code: |
        # Add type hints and a docstring to this function
        def divide(a, b):
            if b == 0:
                return None
            return a / b
    follow_ups:
      en:
        - "What is the difference between type hints and docstrings?"
        - "Are type hints enforced at runtime?"
      ru:
        - "В чём разница между аннотациями типов и докстрингами?"
        - "Проверяются ли аннотации типов во время выполнения?"
    expected_points:
      - "Type hints indicate expected types but are not enforced at runtime"
      - "Docstrings describe what the function does in natural language"
      - "Use Google or NumPy style for docstrings"

  - id: "func-007"
    type: "knowledge"
    difficulty: 2
    tags: ["first-class", "higher-order"]
    question:
      text:
        en: "What does it mean that functions are first-class citizens in Python? Give examples."
        ru: "Что означает, что функции в Python являются объектами первого класса? Приведите примеры."
      code: |
        def greet(name):
            return f"Hello, {name}!"

        # Assign to variable
        say_hello = greet
        print(say_hello("World"))

        # Pass as argument
        def apply(func, value):
            return func(value)

        print(apply(greet, "Python"))
    follow_ups:
      en:
        - "What is a higher-order function?"
        - "How do map, filter, and reduce use this concept?"
      ru:
        - "Что такое функция высшего порядка?"
        - "Как map, filter и reduce используют эту концепцию?"
    expected_points:
      - "Functions can be assigned to variables, passed as arguments, and returned from other functions"
      - "Higher-order functions take or return other functions"
      - "Examples: map(), filter(), sorted(key=...), decorators"

