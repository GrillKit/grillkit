category: "Control Flow"
language: "python"
level: "junior"

description: "Python control flow constructs: conditionals, loops, iterators, and context managers"

questions:
  - id: "cf-001"
    type: "knowledge"
    difficulty: 1
    tags: ["if-elif-else", "conditionals"]
    question:
      text: "Explain how Python evaluates 'if', 'elif', and 'else' blocks. What happens if multiple conditions are True?"
      code: null
    follow_ups:
      - "What is the difference between 'elif' and a separate 'if'?"
      - "Can you write a ternary conditional in Python?"
    expected_points:
      - "Conditions are evaluated from top to bottom"
      - "Only the first True condition's block executes"
      - "'elif' is short for 'else if' — maintains mutual exclusivity with prior conditions"
      - "Ternary: x if condition else y"

  - id: "cf-002"
    type: "knowledge"
    difficulty: 1
    tags: ["for-loop", "while-loop"]
    question:
      text: "What are the different ways to create loops in Python? Compare 'for' and 'while' loops."
      code: null
    follow_ups:
      - "When would you choose a 'while' loop over 'for'?"
      - "What is the 'else' clause on loops used for?"
    expected_points:
      - "'for' loop iterates over iterable objects"
      - "'while' loop continues while a condition is True"
      - "Both support 'break' (exit loop) and 'continue' (skip to next iteration)"
      - "Loop 'else' runs when loop completes normally without break"

  - id: "cf-003"
    type: "coding"
    difficulty: 2
    tags: ["range", "enumerate", "iteration"]
    question:
      text: "How does 'range()' work in Python? What is 'enumerate()' and why is it useful?"
      code: |
        items = ['a', 'b', 'c']
        for i in range(len(items)):
            print(i, items[i])
        # Refactor using enumerate()
    follow_ups:
      - "What does range(5) vs range(2, 8) vs range(1, 10, 2) produce?"
      - "How memory-efficient is range() in Python 3?"
      - "What does enumerate(items, start=1) do?"
    expected_points:
      - "range(start, stop, step) is a lazy sequence, not a list"
      - "enumerate(iterable, start=0) yields (index, value) tuples"
      - "Using enumerate avoids manual indexing and is idiomatic Python"

  - id: "cf-004"
    type: "knowledge"
    difficulty: 2
    tags: ["comprehensions", "list-dict-set"]
    question:
      text: "What are comprehensions in Python? Explain list, dict, and set comprehensions."
      code: |
        squares = []
        for x in range(10):
            squares.append(x ** 2)
        # Convert this into a list comprehension
    follow_ups:
      - "What is a generator expression and how does it differ from a list comprehension?"
      - "Can you use nested comprehensions? Give an example."
    expected_points:
      - "List: [expr for x in iterable if condition]"
      - "Dict: {key: value for x in iterable if condition}"
      - "Set: {expr for x in iterable if condition}"
      - "Generator: (expr for x in iterable) — lazy evaluation"

  - id: "cf-005"
    type: "knowledge"
    difficulty: 2
    tags: ["context-manager", "with"]
    question:
      text: "How does the 'with' statement work in Python? What protocol does it use?"
      code: |
        with open('file.txt', 'r') as f:
            data = f.read()
    follow_ups:
      - "What are __enter__ and __exit__ methods?"
      - "How would you create a custom context manager using contextlib.contextmanager?"
      - "Can you nest multiple context managers in one 'with'?"
    expected_points:
      - "'with' manages resources via context manager protocol"
      - "__enter__ is called on entry, __exit__ on exit — even on exceptions"
      - "Multiple managers: with open(a) as f, open(b) as g:"
      - "@contextmanager from contextlib for generator-based managers"

  - id: "cf-006"
    type: "knowledge"
    difficulty: 1
    tags: ["match-case", "structural-pattern-matching"]
    question:
      text: "What is structural pattern matching (match-case) in Python 3.10? Give a basic usage example."
      code: null
    follow_ups:
      - "How does it differ from a chain of if-elif?"
      - "What are guard conditions in match-case?"
      - "Can you match sequences, mappings, and class instances?"
    expected_points:
      - "Introduced in Python 3.10 — more powerful than switch/case"
      - "Supports matching literals, sequences, mappings, and class instances"
      - "Guards: case pattern if condition:"
      - "Wildcard '_' matches anything"

  - id: "cf-007"
    type: "coding"
    difficulty: 2
    tags: ["zip", "iteration"]
    question:
      text: "How does 'zip()' work in Python? What happens when iterables have different lengths?"
      code: |
        names = ['Alice', 'Bob', 'Charlie']
        scores = [85, 92, 78]
        # Use zip to iterate over both lists simultaneously
    follow_ups:
      - "What does zip(*pairs) do?"
      - "What is itertools.zip_longest?"
      - "What is the 'strict' parameter in zip in Python 3.10+?"
    expected_points:
      - "zip(*iterables) returns iterator of tuples pairing elements by position"
      - "Stops at the shortest iterable by default"
      - "zip_longest from itertools fills missing values"
      - "Python 3.10+: strict=True raises ValueError on length mismatch"
