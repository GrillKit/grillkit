services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/db/grillkit.db}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      HF_TOKEN: ${HF_TOKEN:-}
    restart: unless-stopped
